{t:'s',q:'Write a Stage 3 commissioning prayer — what you are carrying into Stage 4 and what you are asking God to build through the last 23 days of Apostolic Maturity.'}
]},
{day:68,stage:4,title:'What is apostolic maturity?',ref:'Hebrews 5:14',dev:'Solid food is for the mature, who by constant use have trained themselves to distinguish good from evil. Apostolic maturity is a developed capacity — the ability to discern, carry weight, sustain long obedience, reproduce and suffer without breaking.',q:[
{t:'s',q:'In your own words, what does apostolic maturity mean to you? What does it look like when you see it in someone?'},
{t:'m',q:'Hebrews 5:14 says solid food is for the mature who have trained themselves to distinguish good from evil by what?',o:['Prayer and fasting','Constant use','Years of ministry','Theological study']},
{t:'s',q:'Where are you currently in your maturity journey? What markers tell you where you are?'},
{t:'s',q:'What is the difference between being mature and being experienced? Can someone have decades of ministry experience without maturity?'},
{t:'s',q:'What area of your life is God currently pressing you to mature in most urgently?'}
]},
{day:69,stage:4,title:'The apostolic call',ref:'1 Corinthians 1:1',dev:'Paul, called to be an apostle of Christ Jesus by the will of God. Paul did not call himself. He was called — by God, by the will of God. Apostolic identity flows from assignment, not from ambition.',q:[
{t:'s',q:'What is your understanding of apostolic calling — what defines it, what produces it, what confirms it?'},
{t:'m',q:'1 Corinthians 1:1 says Paul was called to be an apostle by whose will?',o:["The church's decision","His own calling","The will of God","The other apostles' recognition"]},
{t:'s',q:'How do you carry your calling without allowing it to become a source of pride or a platform for self-promotion?'},
{t:'s',q:'What is the cost of apostolic calling that most people who desire the title do not fully count?'},
{t:'s',q:'Write an honest assessment of your own apostolic identity — what God has placed on your life, what has been confirmed by fruit and what is still developing.'}
]},
{day:70,stage:4,title:'Suffering as formation',ref:'2 Corinthians 11:24-27',dev:'Five times I received forty lashes minus one. Three times I was beaten with rods. Paul was not complaining — he was establishing apostolic credentials. Suffering is not evidence of God\'s absence. In the apostolic framework it is often evidence of assignment.',q:[
{t:'s',q:'What sufferings have most significantly formed you as a leader? What did they produce that easier seasons could not?'},
{t:'m',q:'In 2 Corinthians 11:27 Paul mentions what physical hardship alongside imprisonment?',o:['Being beaten only','Hunger and thirst, cold and nakedness','Poverty and rejection','Homelessness and persecution']},
{t:'s',q:'What is the difference between suffering that forms and suffering that destroys? What determines which kind you experience?'},
{t:'s',q:'Is there a suffering you are currently in the middle of that you are beginning to see as formation rather than punishment?'},
{t:'s',q:'Write a testimony of one suffering season and what apostolic fruit it produced in your life and ministry.'}
]},
{day:71,stage:4,title:'The apostolic lifestyle',ref:'Acts 2:42',dev:'They devoted themselves to the apostles\' teaching, to fellowship, to the breaking of bread and to prayer. The apostolic lifestyle is not occasional — it is devoted. Devotion is the organizing principle around which everything else is arranged.',q:[
{t:'s',q:'How closely does your current lifestyle reflect the four devotions of Acts 2:42 — teaching, fellowship, communion, prayer?'},
{t:'m',q:'Acts 2:42 says the early disciples devoted themselves to four things. Which of the following is one of them?',o:['Evangelism','The breaking of bread','Giving','Church growth']},
{t:'s',q:'Which of the four devotions is most present in your personal life? Which is most absent?'},
{t:'s',q:'What would it mean for your ministry culture to be genuinely apostolic — not in name but in the daily lived reality of Acts 2:42?'},
{t:'s',q:'Write an apostolic lifestyle commitment — what you commit to personally and what you are establishing in your ministry culture.'}
]},
{day:72,stage:4,title:'Building with gold not wood',ref:'1 Corinthians 3:12-13',dev:'If anyone builds on this foundation using gold, silver, costly stones, wood, hay or straw — the Day will bring it to light. A mature leader is not just concerned with what they build. They are concerned with what they build it with.',q:[
{t:'s',q:'What materials are you currently building your ministry with — gold, silver and costly stones or wood, hay and straw? Be honest.'},
{t:'m',q:'1 Corinthians 3:13 says the fire will test what?',o:["Each person's faith","Each person's intentions","The quality of each person's work","The size of the ministry"]},
{t:'s',q:'What is the difference between building for the moment and building for eternity? How does that shape your daily ministry decisions?'},
{t:'s',q:'What parts of what you are building in SIM are most likely to last? What parts might not survive the fire of testing?'},
{t:'s',q:'Write a building philosophy — what you commit to building, how you commit to building it and the standards of quality and integrity that govern what you lay your hands to.'}
]},
{day:73,stage:4,title:'Apostolic relationships',ref:'Acts 15:25-26',dev:'Barnabas and Paul — men who have risked their lives for the name of our Lord Jesus Christ. Apostolic relationships are forged in shared mission, shared suffering and shared risk. They are not casual connections. They are covenantal ones.',q:[
{t:'s',q:'Who are your apostolic relationships — people who have stood with you in shared mission and shared risk? Name them.'},
{t:'m',q:'Acts 15:26 describes Barnabas and Paul as men who have done what for the name of our Lord Jesus Christ?',o:['Built many churches','Risked their lives','Written scripture','Healed the sick']},
{t:'s',q:'What is the difference between a ministry network and an apostolic relationship? Have you ever confused the two?'},
{t:'s',q:'How do you invest in and maintain apostolic relationships when ministry demands consume most of your time?'},
{t:'s',q:'Write a relational inventory of your five most significant apostolic relationships — what binds you and what you are currently carrying together.'}
]},
{day:74,stage:4,title:'The grace to multiply',ref:'John 12:24',dev:'Unless a kernel of wheat falls to the ground and dies, it remains only a single seed. Apostolic multiplication requires death — the death of being indispensable, the death of the version of ministry that only works when you are at the center.',q:[
{t:'s',q:'What must die in your leadership for genuine multiplication to happen?'},
{t:'m',q:'John 12:24 says unless a kernel of wheat falls to the ground and dies it remains only what?',o:['A kernel','A single seed','Unfruitful','Alone']},
{t:'s',q:'What is your current multiplication rate as a leader — for every person you invest in, how many additional leaders are being produced?'},
{t:'s',q:'What structures or relationships in your ministry are preventing multiplication because they require you to be present and central?'},
{t:'s',q:'Write a multiplication vision for your ministry — what it looks like in 5 years if you genuinely embrace John 12:24.'}
]},
{day:75,stage:4,title:'Pioneering new ground',ref:'Romans 15:20',dev:'It has always been my ambition to preach the gospel where Christ was not known, so that I would not be building on someone else\'s foundation. Paul had a pioneering spirit — compelled toward what did not yet exist. Apostolic maturity always has a pioneering edge.',q:[
{t:'s',q:'Where is the pioneering edge in your current assignment — the ground that has not yet been broken that God is calling you toward?'},
{t:'m',q:"Romans 15:20 says it was Paul's ambition to preach where Christ was not known so that he would not be building on whose foundation?",o:["His own previous work","Someone else's foundation","The Jews' tradition","The synagogue"]},
{t:'s',q:'What is the difference between consolidating what exists and pioneering what does not? Which posture characterizes your leadership?'},
{t:'s',q:'What would you attempt in ministry if you were absolutely certain God was in it? What is stopping you from attempting it now?'},
{t:'s',q:'Write a pioneering vision statement — one frontier in your ministry not yet crossed and your specific commitment to moving toward it.'}
]},
{day:76,stage:4,title:'The apostolic father',ref:'1 Corinthians 4:15',dev:'Even if you had ten thousand guardians in Christ, you do not have many fathers, for in Christ Jesus I became your father through the gospel. Teachers instruct. Guardians protect. Fathers produce.',q:[
{t:'s',q:'Who has functioned as a spiritual father or mother in your life? What specifically did they do that no one else could have done for you?'},
{t:'m',q:'1 Corinthians 4:15 says though you might have ten thousand guardians in Christ you do not have many what?',o:['Teachers','Friends','Fathers','Mentors']},
{t:'s',q:'What is the difference between being a spiritual father or mother and being a mentor or instructor?'},
{t:'s',q:'Who in your sphere are you functioning as a spiritual father or mother to — not just a leader? Name them and describe what that looks like.'},
{t:'s',q:'Write a spiritual fathering covenant — the people you are committing to father and what that covenant means in terms of your time, prayer and long-term investment.'}
]},
{day:77,stage:4,title:'Carrying the weight of vision',ref:'Habakkuk 1:1',dev:'The Hebrew word for prophecy also means burden or weight. A vision from God is not just an exciting picture of the future. It is a weight. It presses you. It wakes you at night. It reorganizes your priorities without asking permission.',q:[
{t:'s',q:'What is the weight of the vision God has given you right now? Describe not just what the vision is but what it feels like to carry it.'},
{t:'m',q:'The Hebrew word for oracle in Habakkuk 1:1 also carries what additional meaning?',o:['Gift','Promise','Burden or weight','Announcement']},
{t:'s',q:'How do you carry the weight of a large vision without being crushed by it?'},
{t:'s',q:'Who else carries the weight of this vision with you? What would happen to the vision if you were suddenly unable to carry it?'},
{t:'s',q:'Write a vision stewardship declaration — how you will carry, protect, communicate and pursue the vision God has given you.'}
]},
{day:78,stage:4,title:'Apostolic courage',ref:'Acts 4:29-31',dev:'Enable your servants to speak your word with great boldness. They had just been threatened. And they prayed not for protection but for boldness. Apostolic courage is not the absence of fear — it is the decision to speak and advance in spite of it.',q:[
{t:'s',q:'Where in your current leadership assignment do you most need apostolic courage — what have you been saying cautiously that needs to be said boldly?'},
{t:'m',q:'Acts 4:31 says after they prayed they were all filled with the Holy Spirit and spoke the word of God how?',o:['Carefully','With great boldness','In many languages','To large crowds']},
{t:'s',q:'What is the difference between courage and recklessness in leadership? How do you know the difference?'},
{t:'s',q:'When was the last time you did something in leadership that required genuine courage — not just confidence but actual risk?'},
{t:'s',q:'Write a courage declaration for your assignment — naming what you have been hesitant about and declaring your commitment to move forward in boldness.'}
]},
{day:79,stage:4,title:'The apostolic church',ref:'Ephesians 2:19-20',dev:'You are built on the foundation of the apostles and prophets, with Christ Jesus himself as the chief cornerstone. The Church was designed to be apostolic. That is its foundation. When a church loses its apostolic foundation it loses its structural integrity.',q:[
{t:'s',q:'What does an apostolic church look like in practice — in its culture, its priorities and its spiritual atmosphere?'},
{t:'m',q:'Ephesians 2:20 says the household of God is built on the foundation of the apostles and prophets with who as the chief cornerstone?',o:['The elders','Peter','Christ Jesus himself','The scriptures']},
{t:'s',q:'How does SIM reflect and express an apostolic church identity? Where is that identity strongest and where does it need strengthening?'},
{t:'s',q:'What is your personal responsibility in maintaining and strengthening the apostolic foundation of SIM?'},
{t:'s',q:'Write an apostolic church vision for SIM — what it looks like fully expressed and what your specific role is in building toward that expression.'}
]},
{day:80,stage:4,title:'Maintaining your first love',ref:'Revelation 2:4-5',dev:'You have forsaken the love you had at first. The church at Ephesus was doing everything right — doctrine, perseverance, discernment — and Jesus had one thing against them. They had lost the love. Apostolic maturity that loses love is not maturity — it is religion.',q:[
{t:'s',q:'When was the last time you felt genuinely, spontaneously in love with Jesus — not performing worship but experiencing it?'},
{t:'m',q:'Revelation 2:5 says to remember the height from which you have fallen, to repent and to do what?',o:["Seek more of God","The things you did at first","Build the church again","Return to prayer"]},
{t:'s',q:'What is the primary thing that erodes first love in a leader\'s life over years of ministry?'},
{t:'s',q:'What specific things did you do in the early years of your relationship with God that you no longer do?'},
{t:'s',q:'Write a first love renewal prayer — returning to God as your first love and committing to the practices that sustain that love.'}
]},
{day:81,stage:4,title:'Signs and wonders',ref:'Acts 5:12',dev:'The apostles performed many signs and wonders among the people. Signs and wonders were not incidental to the apostolic mission — they were essential to it. They confirmed the message, broke through unbelief and demonstrated that the Kingdom is a living power.',q:[
{t:'s',q:'What is your theology of signs and wonders in the current era? How does that theology shape what you expect in your ministry?'},
{t:'m',q:'Acts 5:12 says the apostles performed many signs and wonders and all the believers used to meet together where?',o:["In people's homes","In Solomon's Colonnade","In the synagogue","In the upper room"]},
{t:'s',q:'What signs and wonders have you witnessed in your own ministry? What impact did they have?'},
{t:'s',q:'What is the danger of pursuing signs and wonders as an end in themselves?'},
{t:'s',q:'Write a prayer of contention for signs and wonders in your ministry — specific to your assignment and context.'}
]},
{day:82,stage:4,title:'Apostolic suffering revisited',ref:'Philippians 3:10',dev:'I want to know Christ — yes to know the power of his resurrection and participation in his sufferings. Paul desired both. Not the resurrection without the suffering. Apostolic maturity does not avoid the cross — it embraces it.',q:[
{t:'s',q:'How has your understanding of apostolic suffering deepened from Day 70 to today — 12 days later?'},
{t:'m',q:'Philippians 3:10 says Paul wanted to know Christ and the power of his resurrection and also participation in what?',o:["His ministry","His wisdom","His sufferings","His authority"]},
{t:'s',q:'What cross are you currently carrying that is specifically connected to your apostolic assignment?'},
{t:'s',q:'What is the difference between suffering that refines and suffering that should simply be addressed and removed?'},
{t:'s',q:'Write a fellowship of suffering prayer — not asking God to remove the cross but asking Him to meet you in it and bring resurrection fruit from it.'}
]},
{day:83,stage:4,title:'Operating in spiritual gifts at maturity',ref:'1 Corinthians 14:1',dev:'Follow the way of love and eagerly desire gifts of the Spirit, especially prophecy. At maturity, spiritual gifts should be more active, more precise and more fruitful than they were at the beginning. Maturity does not graduate from gifts — it sharpens them.',q:[
{t:'s',q:'How have the spiritual gifts God placed on your life matured and developed from when you first began in ministry?'},
{t:'m',q:'1 Corinthians 14:1 says to follow the way of love and eagerly desire gifts of the Spirit especially which gift?',o:['Tongues','Healing','Prophecy','Words of knowledge']},
{t:'s',q:'What spiritual gifts are most active in your life right now? How are they being deployed in your assignment in SIM?'},
{t:'s',q:'What spiritual gifts have you neglected or allowed to become dormant? What would it take to stir them up again?'},
{t:'s',q:'Write a gift activation prayer — stirring up the gifts within you and committing to steward them with greater intentionality.'}
]},
{day:84,stage:4,title:'Governing well',ref:'Romans 12:8',dev:'If it is to lead, do it diligently. The gift of leadership is described with one word of instruction: diligently. Not passionately. Not charismatically. Diligently. Apostolic maturity in governance is about sustained, disciplined, faithful execution of responsibility over time.',q:[
{t:'s',q:'What does it mean to govern well in your current assignment? What are the specific governance responsibilities you carry?'},
{t:'m',q:'Romans 12:8 says if your gift is to lead then lead how?',o:['With faith','Diligently','With passion','In the Spirit']},
{t:'s',q:'Where does your governance currently need the most improvement — in structure, consistency, follow-through or communication?'},
{t:'s',q:'What is the difference between leading with vision and governing with diligence? Which do you do more naturally?'},
{t:'s',q:'Write a governance commitment for your current assignment — what you are committing to in how you manage, structure and steward what is entrusted to you.'}
]},
{day:85,stage:4,title:'The cost of apostolic calling',ref:'Luke 14:28',dev:'Suppose one of you wants to build a tower. Won\'t you first sit down and estimate the cost? Apostolic calling is not a calling you can casually accept and occasionally pursue. It costs everything.',q:[
{t:'s',q:'Have you fully counted the cost of apostolic calling in your specific life and assignment? What has it cost you that you did not expect?'},
{t:'m',q:'Luke 14:28 says before beginning to build a tower you should sit down and estimate the cost to see if you have enough to do what?',o:['Start it','Finish it','Fund it','Plan it']},
{t:'s',q:'What is the relationship between counting the cost and the level of commitment you bring to your assignment?'},
{t:'s',q:'What cost are you currently paying for your apostolic assignment that most people who observe your ministry do not see?'},
{t:'s',q:'Write an honest cost assessment of your calling — what it has cost, what it is currently costing and what you believe it will cost in the future. Then declare your willingness to pay it.'}
]},
{day:86,stage:4,title:'Sustaining the long obedience',ref:'Hebrews 12:1',dev:'Let us run with perseverance the race marked out for us. Not someone else\'s race. The race marked out for us — our specific, irreplaceable assignment. The instruction is not to sprint. It is to run with perseverance.',q:[
{t:'s',q:'What does the race marked out for you specifically look like right now — its pace, its terrain, its distance?'},
{t:'m',q:'Hebrews 12:1 says to throw off everything that hinders and the sin that so easily entangles and to run with what?',o:['Faith','Speed','Perseverance','Joy']},
{t:'s',q:'What has caused you to slow down or stumble in your race in recent seasons?'},
{t:'s',q:'What entangles you most consistently — what comes back repeatedly to slow you down that you need to lay aside permanently?'},
{t:'s',q:'Write a long-obedience declaration — committing to the race, identifying the weights you are laying down and declaring your intention to finish what God has given you to run.'}
]},
{day:87,stage:4,title:'When seasons change',ref:'Ecclesiastes 3:1',dev:'There is a time for everything, and a season for every activity under the heavens. Apostolic maturity includes the wisdom to recognize when a season is ending and the courage to transition well. Many leaders stay in finished seasons because they do not know how to leave.',q:[
{t:'s',q:'What season do you believe you are currently in — a beginning, a middle or an ending? What tells you that?'},
{t:'m',q:'Ecclesiastes 3:1 says there is a time for everything and a season for every activity under what?',o:["God's authority","The heavens","The sun","Heaven and earth"]},
{t:'s',q:'Have you ever stayed in a season past its appointed end? What happened?'},
{t:'s',q:'What would it look like to transition seasons with apostolic wisdom — honoring what was, releasing what must be released and embracing what is coming?'},
{t:'s',q:'Write a seasonal discernment prayer — asking God for clarity about what season you are in and what He is completing and initiating in your assignment right now.'}
]},
{day:88,stage:4,title:'Leaving a legacy',ref:'Psalm 78:4',dev:'We will tell the next generation the praiseworthy deeds of the Lord. Legacy is not what you accomplish. It is what the generation after you knows about God because of your life.',q:[
{t:'s',q:'What do you want the generation after you to know about God because of your life and your ministry?'},
{t:'m',q:'Psalm 78:4 says we will tell the next generation the praiseworthy deeds of the Lord, his power and what else?',o:["His laws","His covenant","The wonders he has done","His faithfulness"]},
{t:'s',q:'What is currently the most significant element of your legacy in SIM — what has your presence produced that will outlast you?'},
{t:'s',q:'What are you building right now that will still be bearing fruit 20 years after you are no longer in your current role?'},
{t:'s',q:'Write a legacy declaration — not what you want to be remembered for but what you commit to building and what you commit to transferring to the generation after you.'}
]},
{day:89,stage:4,title:'The final mile',ref:'2 Timothy 4:7',dev:'I have fought the good fight, I have finished the race, I have kept the faith. Three declarations. Past tense. Complete. Paul wrote them from prison awaiting execution. He was not hoping to finish — he had finished. Day 89. One day from the end.',q:[
{t:'s',q:'As you approach the end of this 90-day journey, what would you say about your fight, your race and your faith over these three months?'},
{t:'m',q:'2 Timothy 4:7 says Paul had fought the good fight, finished the race and done what else?',o:['Loved well','Built the church','Kept the faith','Honored his calling']},
{t:'s',q:'What has this 90-day program finished in you — what is complete now that was not complete 89 days ago?'},
{t:'s',q:'What do you still need to finish — in your character, in your assignment, in your relationships — that this journey has exposed as incomplete?'},
{t:'s',q:'Write a final mile prayer — tell God exactly where you are, what He has done in you and what you are carrying forward.'}
]},
{day:90,stage:4,title:'The covenant of apostolic commission',ref:'Matthew 28:18-20',dev:'All authority in heaven and on earth has been given to me. Therefore go and make disciples of all nations. And surely I am with you always, to the very end of the age. This is where everything ends and everything begins.',q:[
{t:'s',q:'You made it to Day 90. Read Matthew 28:18-20 slowly three times before answering. What word or phrase from that passage is most alive to you today and why?'},
{t:'m',q:'Matthew 28:18 says all authority in heaven and on earth has been given to Jesus. What does He then say as a result?',o:['Worship and pray','Be baptized','Go and make disciples','Come to me']},
{t:'s',q:'What has this 90-day journey produced in you that the first 30 days and then 60 days could not have produced on their own?'},
{t:'s',q:'Write the most important thing God has shown you about yourself, about leadership and about apostolic calling over these 90 days. One paragraph each — three total.'},
{t:'s',q:'Write your apostolic commission statement — who you are, what you carry, where you are sent, what you are building and what you are declaring over your life from this day forward. This is your covenant with God. Make it worthy of the 90 days it took to get here.'}
]}
];

let user=null,subs={},curDay=1,stageFilt=0,mcSel={};
const sn={1:'Intercession & Prayer',2:'Spiritual Warfare',3:'Team Dynamics',4:'Apostolic Maturity'};
const sb={1:'s1',2:'s2',3:'s3',4:'s4'};

function toggleCode(){
  const f=document.getElementById('enroll-code-field');
  f.style.display=f.style.display==='block'?'none':'block';
}
function saveLocal(){
  if(!user)return;
  const k='siu_core90_'+user.email.replace(/[^a-z0-9]/gi,'_');
  localStorage.setItem(k,JSON.stringify({user,subs,curDay}));
}
function loadLocal(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('siu_core90_'));
  if(!keys.length)return false;
  const d=JSON.parse(localStorage.getItem(keys[keys.length-1]));
  if(!d||!d.user)return false;
  user=d.user;subs=d.subs||{};curDay=d.curDay||1;mcSel={};return true;
}
function doLogin(){
  const name=document.getElementById('inp-name').value.trim();
  const email=document.getElementById('inp-email').value.trim();
  const role=document.getElementById('inp-role').value;
  const code=document.getElementById('inp-code').value.trim();
  const err=document.getElementById('login-err');
  if(!name||!email||!role){err.textContent='Please fill in all fields.';err.style.display='block';return;}
  if(!email.includes('@')){err.textContent='Please enter a valid email address.';err.style.display='block';return;}
  if(code&&code.toUpperCase()!==ADMIN_CODE){err.textContent='Invalid enrollment code.';err.style.display='block';return;}
  err.style.display='none';
  user={name,email,role,code:code||'self-enrolled'};
  saveLocal();initApp();
}
function doLogout(){
  if(!confirm('Sign out? Your progress is saved.'))return;
  user=null;
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
}
function initApp(){
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  const ini=user.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('hdr-avatar').textContent=ini;
  document.getElementById('hdr-name').textContent=user.name.split(' ')[0];
  updateProgress();renderGrid();renderStudy(curDay);
}
function switchTab(t){
  document.getElementById('tab-study').style.display=t==='study'?'block':'none';
  document.getElementById('tab-report').style.display=t==='report'?'block':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(t==='study'&&i===0)||(t==='report'&&i===1)));
  if(t==='report')renderReport();
}
function setStage(s,el){
  stageFilt=s;
  document.querySelectorAll('.stage-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');renderGrid();
}
function renderGrid(){
  const days=stageFilt===0?DAYS:DAYS.filter(d=>d.stage===stageFilt);
  document.getElementById('day-grid').innerHTML=days.map(d=>{
    const done=subs[d.day]?.submitted;
    const act=d.day===curDay&&!done;
    return '<div class="day-dot'+(done?' done':'')+(act?' active':'')+'" onclick="selectDay('+d.day+')"><span>Day</span><span>'+d.day+'</span></div>';
  }).join('');
}
function selectDay(n){
  curDay=n;if(!mcSel[n])mcSel[n]={};saveLocal();renderGrid();renderStudy(n);
  document.getElementById('study-content').scrollIntoView({behavior:'smooth',block:'start'});
}
function renderStudy(n){
  const d=DAYS.find(x=>x.day===n);if(!d)return;
  const done=subs[n]?.submitted;
  const saved=subs[n]?.answers||{};
  const qHtml=d.q.map((q,i)=>{
    const sv=saved[i]||'';
    if(q.t==='m'){
      const opts=q.o.map(o=>{
        const sel=done?sv===o:(mcSel[n]?.[i]===o);
        return '<div class="mc-item'+(sel?' sel':'')+(done?' readonly':'')+'" onclick="'+(done?'':'handleMC('+n+','+i+',this)')+'"><div class="mc-radio"><div class="mc-radio-dot"></div></div>'+o+'</div>';
      }).join('');
      return '<div class="q-block"><div class="q-label">Question '+(i+1)+' · Multiple choice</div><div class="q-text">'+q.q+'</div><div class="mc-list">'+opts+'</div></div>';
    }
    return '<div class="q-block"><div class="q-label">Question '+(i+1)+' · Short answer</div><div class="q-text">'+q.q+'</div><textarea class="ans-input" id="ans_'+n+'_'+i+'" '+(done?'readonly':'')+'>'+(sv)+'</textarea></div>';
  }).join('');
  const prev=n>1?'<button class="nav-btn" onclick="selectDay('+(n-1)+')">← Day '+(n-1)+'</button>':'';
  const next=n<90?'<button class="nav-btn" onclick="selectDay('+(n+1)+')">Day '+(n+1)+' →</button>':'';
  document.getElementById('study-content').innerHTML='<div class="study-card"><span class="stage-badge '+sb[d.stage]+'">Stage '+d.stage+' · '+sn[d.stage]+'</span><div class="day-num">Day '+d.day+' of 60</div><div class="day-title">'+d.title+'</div><div class="ref-block"><span class="ref-text">'+d.ref+' · The Message</span><a class="bg-btn" href="'+BG_BASE+encodeURIComponent(d.ref)+BG_VER+'" target="_blank">Read on Bible Gateway</a></div><div class="devotional">'+d.dev+'</div>'+qHtml+(done?'<div class="done-banner"><strong>Day '+n+' complete ✓</strong>Submitted '+subs[n].time+'<br><span style="font-size:12px;opacity:.75">Apostle Everett can see your responses in the live dashboard.</span></div>':'<button class="submit-btn" id="sbtn-'+n+'" onclick="submitDay('+n+')">Submit Day '+n+'</button>')+'<div id="toast-'+n+'" class="toast"></div><div class="nav-row">'+prev+next+'</div></div>';
}
function handleMC(dayN,qi,el){
  if(!mcSel[dayN])mcSel[dayN]={};
  const val=el.innerText.trim();
  mcSel[dayN][qi]=val;
  el.closest('.mc-list').querySelectorAll('.mc-item').forEach(item=>item.classList.remove('sel'));
  el.classList.add('sel');
}
function showToast(n,msg,type){
  const t=document.getElementById('toast-'+n);
  if(!t)return;t.className='toast '+type;t.textContent=msg;
}
async function submitDay(n){
  const d=DAYS.find(x=>x.day===n);
  const answers={};let missing=false;
  d.q.forEach((q,i)=>{
    if(q.t==='s'){const el=document.getElementById('ans_'+n+'_'+i);if(!el||el.value.trim()===''){missing=true;return;}answers[i]=el.value.trim();}
    else{const sv=mcSel[n]?.[i];if(!sv){missing=true;return;}answers[i]=sv;}
  });
  if(missing){showToast(n,'Please answer all 5 questions before submitting.','err');return;}
  const btn=document.getElementById('sbtn-'+n);
  if(btn){btn.disabled=true;btn.textContent='Saving...';}
  showToast(n,'Saving your responses...','saving');
  const ts=new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  const payload={name:user.name,email:user.email,role:user.role,stage:d.stage,day:d.day,dayTitle:d.title,ref:d.ref,track:'Core Leadership 60-Day',q1:d.q[0].q,a1:answers[0]||'',q2:d.q[1].q,a2:answers[1]||'',q3:d.q[2].q,a3:answers[2]||'',q4:d.q[3].q,a4:answers[3]||'',q5:d.q[4].q,a5:answers[4]||''};
  try{
    if(APPS_SCRIPT_URL&&APPS_SCRIPT_URL!=='https://script.google.com/macros/s/AKfycbzOmJ9XPFuCuoKC3y1QfMf91YkP__SIccLheK-0krGPiycnr5tgjcBlp3BGv2iJWJPtgQ/exec'){
      await fetch(APPS_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),mode:'no-cors'});
    }
  }catch(err){console.warn('Sheet sync:',err);}
  subs[n]={answers,submitted:true,time:ts};saveLocal();updateProgress();renderGrid();renderStudy(n);
}
function updateProgress(){
  const done=Object.values(subs).filter(s=>s.submitted).length;
  const pct=Math.round(done/60*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent='Day '+done+' of 90 complete';
}
function testConnection(){
  const box=document.getElementById('conn-status');
  box.style.display='block';box.style.background='var(--warn-bg)';box.style.color='var(--warn)';box.textContent='Testing connection...';
  fetch(APPS_SCRIPT_URL,{method:'GET',mode:'no-cors'})
    .then(()=>{box.style.background='var(--success-bg)';box.style.color='var(--success)';box.textContent='Connection successful — submissions will flow to Apostle Everett\'s sheet automatically.';})
    .catch(err=>{box.style.background='var(--danger-bg)';box.style.color='var(--danger)';box.textContent='Connection failed: '+err.message;});
}
function renderReport(){
  const done=Object.values(subs).filter(s=>s.submitted).length;
  const sc=[0,0,0,0,0];const st=[0,22,23,22,23];
  DAYS.forEach(d=>{if(subs[d.day]?.submitted)sc[d.stage]++;});
  document.getElementById('metrics-grid').innerHTML='<div class="metric-card"><div class="metric-val">'+done+'</div><div class="metric-lbl">Days completed</div></div><div class="metric-card"><div class="metric-val">'+(60-done)+'</div><div class="metric-lbl">Days remaining</div></div><div class="metric-card"><div class="metric-val">'+Math.round(done/60*100)+'%</div><div class="metric-lbl">Progress</div></div><div class="metric-card"><div class="metric-val">'+(done*5)+'</div><div class="metric-lbl">Responses logged</div></div>';
  const sl=['','Stage 1 · Intercession & Prayer','Stage 2 · Spiritual Warfare','Stage 3 · Team Dynamics','Stage 4 · Apostolic Maturity'];
  document.getElementById('stage-progress').innerHTML=[1,2,3,4].map(s=>'<div class="stage-row"><div class="stage-labels"><span>'+sl[s]+'</span><span class="stage-pct">'+sc[s]+'/'+st[s]+'</span></div><div class="prog-track"><div class="prog-inner" style="width:'+Math.round(sc[s]/st[s]*100)+'%"></div></div></div>').join('');
  const entries=Object.entries(subs).filter(([,v])=>v.submitted).sort((a,b)=>+a[0]-+b[0]);
  if(!entries.length){document.getElementById('sub-list').innerHTML='<div class="empty-state">No submissions yet. Complete your first day to see your responses here.</div>';return;}
  document.getElementById('sub-list').innerHTML=entries.map(([dn,sub])=>{
    const d=DAYS.find(x=>x.day===+dn);
    const prev=sub.answers[0]?sub.answers[0].substring(0,80)+'...':'[Multiple choice]';
    const ansHtml=d.q.map((q,i)=>'<div class="ans-q"><span class="ans-q-label">Q'+(i+1)+': '+q.q+'</span><span class="ans-q-text">'+(sub.answers[i]||'—')+'</span></div>').join('');
    return '<div class="sub-item"><div class="sub-header"><div><div class="sub-name">Day '+dn+' — '+d.title+'</div></div><span class="sub-badge">Done ✓</span></div><div class="sub-time">'+sub.time+'</div><div class="sub-preview">'+prev+'</div><button class="expand-btn" onclick="toggleDetail(this,\'det-'+dn+'\')">View all 5 responses ↓</button><div class="ans-detail" id="det-'+dn+'">'+ansHtml+'</div></div>';
  }).join('');
}
function toggleDetail(btn,id){const el=document.getElementById(id);if(!el)return;const open=el.style.display==='block';el.style.display=open?'none':'block';btn.textContent=open?'View all 5 responses ↓':'Hide responses ↑';}
if(loadLocal()){initApp();}else{document.getElementById('screen-login').classList.add('active');}
</script>
</body>
</html>
