<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SIU 90-Day">
<title>SIU — 90-Day Core Leadership</title>
<style>
:root{
  --navy:#1B2E5E;
  --navy-dark:#111E3F;
  --navy-mid:#243570;
  --gold:#D4AF37;
  --gold-lt:#F5E9A9;
  --gold-dk:#A8860A;
  --white:#FFFFFF;
  --bg:#F4F5F8;
  --border:#D8DCE8;
  --text:#1A1A2E;
  --muted:#5A6080;
  --success-bg:#D1FAE5;
  --success:#065F46;
  --danger-bg:#FEE2E2;
  --danger:#991B1B;
  --warn-bg:#FEF3C7;
  --warn:#92400E;
  --s1-bg:#EDE9FE;--s1-txt:#4C1D95;
  --s2-bg:#D1FAE5;--s2-txt:#065F46;
  --s3-bg:#FEF3C7;--s3-txt:#78350F;
  --s4-bg:#E0E7FF;--s4-txt:#1E3A8A;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* LOGIN */
#screen-login{background:var(--navy-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;min-height:100vh}
#screen-login.active{display:flex}
.login-logo{width:140px;height:140px;border-radius:50%;overflow:hidden;margin-bottom:1.25rem;border:3px solid var(--gold)}
.login-logo img{width:100%;height:100%;object-fit:cover}
.login-title{font-size:24px;font-weight:700;color:var(--white);text-align:center;letter-spacing:.5px}
.login-sub{font-size:13px;color:var(--gold);text-align:center;margin-bottom:.25rem;letter-spacing:1px;text-transform:uppercase}
.login-track{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:1.75rem}
.login-card{width:100%;max-width:360px;background:var(--white);border-radius:var(--radius);padding:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select{width:100%;padding:12px 14px;font-size:16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--white);color:var(--text);font-family:inherit;-webkit-appearance:none}
.field input:focus,.field select:focus{outline:2px solid var(--gold);border-color:transparent}
.enroll-code{display:none}
.enroll-toggle{font-size:13px;color:var(--navy);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;margin-bottom:1rem;text-decoration:underline}
.btn-primary{width:100%;padding:14px;font-size:16px;font-weight:700;border:none;border-radius:var(--radius-sm);background:var(--navy);color:var(--gold);cursor:pointer;font-family:inherit;letter-spacing:.5px}
.btn-primary:active{opacity:.9}
.login-err{display:none;margin-top:.75rem;padding:.75rem;background:var(--danger-bg);color:var(--danger);border-radius:var(--radius-sm);font-size:13px;text-align:center}

/* APP HEADER */
#screen-app{background:var(--bg)}
.app-header{background:var(--navy-dark);padding:.875rem 1rem .75rem;position:sticky;top:0;z-index:100}
.app-header-top{display:flex;align-items:center;gap:10px;margin-bottom:.6rem}
.hdr-logo{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid var(--gold);flex-shrink:0}
.hdr-logo img{width:100%;height:100%;object-fit:cover}
.hdr-titles{flex:1}
.hdr-titles h1{font-size:13px;font-weight:700;color:var(--white);letter-spacing:.3px}
.hdr-titles p{font-size:11px;color:var(--gold);letter-spacing:.5px}
.user-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border-radius:99px;padding:4px 10px 4px 5px;flex-shrink:0}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--navy-dark)}
.user-name{font-size:11px;color:rgba(255,255,255,.85)}
.prog-bar-wrap{height:5px;background:rgba(255,255,255,.15);border-radius:99px}
.prog-bar-fill{height:100%;border-radius:99px;background:var(--gold);transition:width .4s ease}
.prog-label{font-size:11px;color:rgba(255,255,255,.5);margin-top:.3rem}

/* TABS */
.tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--white);border-bottom:1px solid var(--border)}
.tab{padding:12px;font-size:14px;font-weight:500;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;border-bottom:3px solid transparent}
.tab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:700}

/* STAGE BAR */
.stage-bar{display:flex;gap:6px;overflow-x:auto;padding:.75rem 1rem;background:var(--white);border-bottom:1px solid var(--border);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.stage-bar::-webkit-scrollbar{display:none}
.stage-pill{flex-shrink:0;padding:6px 13px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:99px;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:inherit}
.stage-pill.active{background:var(--navy);color:var(--gold);border-color:var(--navy)}

/* DAY GRID */
.day-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:.75rem 1rem;background:var(--white);border-bottom:1px solid var(--border)}
.day-dot{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);gap:1px;min-height:44px;-webkit-user-select:none;user-select:none;transition:all .15s}
.day-dot span:first-child{font-size:9px;font-weight:400}
.day-dot.done{background:var(--success-bg);border-color:#5cb85c;color:#1a5c35}
.day-dot.active{background:var(--navy);color:var(--gold);border-color:var(--navy)}
.day-dot:active{transform:scale(.95)}

/* STUDY CARD */
.study-content{padding:1rem}
.study-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.stage-badge{display:inline-block;padding:4px 12px;font-size:11px;font-weight:700;border-radius:99px;margin-bottom:.75rem;letter-spacing:.3px}
.s1{background:var(--s1-bg);color:var(--s1-txt)}
.s2{background:var(--s2-bg);color:var(--s2-txt)}
.s3{background:var(--s3-bg);color:var(--s3-txt)}
.s4{background:var(--s4-bg);color:var(--s4-txt)}
.day-num{font-size:12px;color:var(--muted);margin-bottom:.2rem}
.day-title{font-size:20px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:.75rem}
.ref-block{margin-bottom:1rem}
.ref-text{font-size:13px;color:var(--muted);margin-bottom:.5rem;display:block}
.bg-btn{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:#1a5276;border:1px solid #aed6f1;border-radius:var(--radius-sm);padding:10px 16px;text-decoration:none;background:#eaf4fb}
.devotional{font-size:15px;color:var(--muted);line-height:1.75;font-style:italic;border-left:3px solid var(--gold);padding-left:.875rem;margin-bottom:1.25rem}
.q-block{margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.q-block:last-of-type{border-bottom:none;padding-bottom:0}
.q-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:.4rem}
.q-text{font-size:15px;color:var(--text);line-height:1.6;margin-bottom:.6rem;font-weight:500}
textarea.ans-input{width:100%;padding:12px 14px;font-size:16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);resize:vertical;min-height:88px;font-family:inherit;line-height:1.5;-webkit-appearance:none}
textarea.ans-input:focus{outline:2px solid var(--navy);border-color:transparent;background:var(--white)}
textarea.ans-input[readonly]{background:#f0f0ed;color:var(--muted)}
.mc-list{display:flex;flex-direction:column;gap:8px}
.mc-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:15px;color:var(--text);background:var(--white);-webkit-user-select:none;user-select:none;min-height:50px;transition:all .15s}
.mc-item.sel{background:var(--success-bg);border-color:#5cb85c;color:#065f46;font-weight:500}
.mc-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.mc-item.sel .mc-radio{background:#5cb85c;border-color:#5cb85c}
.mc-radio-dot{width:8px;height:8px;border-radius:50%;background:white;display:none}
.mc-item.sel .mc-radio-dot{display:block}
.submit-btn{width:100%;padding:15px;font-size:16px;font-weight:700;border:none;border-radius:var(--radius-sm);background:var(--navy);color:var(--gold);cursor:pointer;font-family:inherit;margin-top:1rem;letter-spacing:.5px}
.submit-btn:active{opacity:.9}
.submit-btn:disabled{opacity:.5}
.toast{padding:.875rem 1rem;border-radius:var(--radius-sm);font-size:14px;margin-top:.75rem;text-align:center;display:none;line-height:1.4}
.toast.ok{background:var(--success-bg);color:var(--success);display:block}
.toast.err{background:var(--danger-bg);color:var(--danger);display:block}
.toast.saving{background:var(--warn-bg);color:var(--warn);display:block}
.done-banner{padding:1rem;background:var(--success-bg);color:#065f46;border-radius:var(--radius-sm);font-size:14px;text-align:center;margin-top:.75rem;line-height:1.6;border:1px solid #a7f3d0}
.done-banner strong{display:block;font-size:15px;margin-bottom:.2rem}
.nav-row{display:flex;gap:8px;margin-top:1rem}
.nav-btn{flex:1;padding:13px;font-size:14px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--white);color:var(--text);cursor:pointer;font-family:inherit;text-align:center}

/* REPORT */
.report-content{padding:1rem}
.siu-banner{background:var(--navy-dark);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem}
.siu-banner-logo{width:56px;height:56px;border-radius:50%;overflow:hidden;border:2px solid var(--gold);flex-shrink:0}
.siu-banner-logo img{width:100%;height:100%;object-fit:cover}
.siu-banner-text strong{display:block;font-size:15px;color:var(--white);font-weight:700}
.siu-banner-text span{font-size:12px;color:var(--gold)}
.siu-banner-text a{display:inline-block;margin-top:.5rem;padding:7px 14px;background:var(--gold);color:var(--navy-dark);border-radius:var(--radius-sm);font-size:12px;font-weight:700;text-decoration:none}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.metric-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
.metric-val{font-size:28px;font-weight:700;color:var(--navy)}
.metric-lbl{font-size:12px;color:var(--muted);margin-top:2px}
.section-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.section-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.5px}
.stage-row{margin-bottom:.875rem}
.stage-row:last-child{margin-bottom:0}
.stage-labels{display:flex;justify-content:space-between;font-size:13px;color:var(--text);margin-bottom:.35rem}
.stage-pct{color:var(--muted);font-size:12px}
.prog-track{height:7px;background:var(--border);border-radius:99px}
.prog-inner{height:100%;border-radius:99px;background:var(--navy);transition:width .5s ease}
.sub-item{padding:1rem 0;border-bottom:1px solid var(--border)}
.sub-item:last-child{border-bottom:none}
.sub-header{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.3rem}
.sub-name{font-size:15px;font-weight:700;color:var(--text)}
.sub-badge{font-size:11px;color:var(--success);background:var(--success-bg);padding:3px 8px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.sub-day-info{font-size:13px;color:var(--navy);font-weight:600;margin-bottom:.2rem}
.sub-time{font-size:11px;color:var(--muted)}
.sub-preview{font-size:13px;color:var(--muted);margin:.5rem 0;line-height:1.5}
.expand-btn{font-size:13px;color:#1a5276;background:none;border:none;cursor:pointer;padding:3px 0;font-family:inherit}
.ans-detail{display:none;margin-top:.75rem;background:var(--bg);border-radius:var(--radius-sm);padding:.875rem;border:1px solid var(--border)}
.ans-q{margin-bottom:.75rem;font-size:13px;line-height:1.6}
.ans-q:last-child{margin-bottom:0}
.ans-q-label{font-weight:700;color:var(--text);display:block;margin-bottom:.2rem}
.ans-q-text{color:var(--muted)}
.conn-status{display:none;padding:.875rem 1rem;border-radius:10px;font-size:14px;margin-bottom:.75rem;text-align:center;line-height:1.5}
.test-btn{width:100%;padding:13px;font-size:14px;font-weight:500;border:1px solid #aed6f1;border-radius:10px;background:#eaf4fb;color:#1a5276;cursor:pointer;font-family:inherit;margin-bottom:.75rem}
.logout-btn{width:100%;padding:13px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;margin-top:.5rem}
.empty-state{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:14px;line-height:1.7}
</style>
</head>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzOmJ9XPFuCuoKC3y1QfMf91YkP__SIccLheK-0krGPiycnr5tgjcBlp3BGv2iJWJPtgQ/exec';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1Czc2AOsWVh2jHCxyuCRTuPqk-A32NVpec8u2l0kV4-s/edit';
const BG_BASE = 'https://www.biblegateway.com/passage/?search=';
const BG_VER = '&version=MSG';
const ADMIN_CODE = 'SIU2024';
const TRACK = 'Core Leadership';
const LEVEL = '60-Day';

const sName={1:'Intercession & Prayer',2:'Spiritual Warfare',3:'Team Dynamics',4:'Apostolic Maturity'};
const sBadge={1:'s1',2:'s2',3:'s3',4:'s4'};

const DAYS=[
{day:1,stage:1,title:'The ministry of intercession',ref:'Isaiah 62:6-7',dev:'God has posted watchmen on the walls who will never be silent day or night. An intercessor is not someone who prays occasionally — they are a watchman posted with a specific assignment.',q:[
{t:'s',q:'What is the difference between general prayer and the ministry of intercession? How do you currently see yourself in relation to that difference?'},
{t:'s',q:'Isaiah 62 describes intercessors who give themselves no rest until God establishes Jerusalem. What does that level of intensity in prayer look like in your life right now?'},
{t:'m',q:'Isaiah 62:6 says the watchmen on the walls will never be what?',o:['Tired','Silent day or night','Alone','Afraid']},
{t:'s',q:'What specific assignment in intercession do you believe God has given you — for SIM, your city, your family?'},
{t:'s',q:'What would it mean for you to take the ministry of intercession seriously as a primary leadership function rather than a supplemental spiritual activity?'}
]},
{day:2,stage:1,title:'Praying the Word',ref:'Jeremiah 1:12',dev:'God told Jeremiah: "I am watching over My word to perform it." When you pray scripture back to God you are partnering with something He has already committed to perform.',q:[
{t:'s',q:'What does it mean to pray the Word of God rather than just about your circumstances? Give a specific example of how you do this.'},
{t:'m',q:'Jeremiah 1:12 says God is watching over His word to do what to it?',o:['Preserve it','Perform it','Protect it','Proclaim it']},
{t:'s',q:'Choose one scripture relevant to something you are currently praying about. Write it out and then write a prayer built entirely from its language.'},
{t:'s',q:'How does praying scripture change the confidence level of your intercession?'},
{t:'s',q:'What portion of your prayer time is currently Word-based versus circumstance-based? What would you like that ratio to be?'}
]},
{day:3,stage:1,title:'Travailing prayer',ref:'Romans 8:26-27',dev:'The Spirit Himself intercedes with groanings too deep for words. There is a dimension of intercession that goes beyond language. It is prayer that feels like labor. Like birth. It is not performed — it erupts.',q:[
{t:'s',q:'Have you ever experienced travailing prayer — prayer that felt like physical or spiritual labor? Describe what that was like.'},
{t:'m',q:'Romans 8:26 says the Spirit helps us in our weakness because we do not know what?',o:["God's will","How to pray as we ought","Scripture well enough","When to pray"]},
{t:'s',q:'What is the difference between emotional prayer and Spirit-led travail? How do you discern between them?'},
{t:'s',q:'What burden is currently on your heart that may be an invitation to travailing prayer rather than just petition?'},
{t:'s',q:'How do you make room in your prayer life for the Holy Spirit to lead you into depths of intercession that your mind cannot construct?'}
]},
{day:4,stage:1,title:'Corporate intercession',ref:'Acts 1:14',dev:'They all joined together constantly in prayer. Different personalities, different histories — all in one room, in one accord, in prayer. Corporate intercession is a different dimension from individual prayer.',q:[
{t:'s',q:'What is the difference between corporate prayer and individual prayer said in the same room at the same time?'},
{t:'m',q:'Acts 1:14 says the disciples joined together in prayer with one what?',o:['Voice','Accord','Heart','Purpose']},
{t:'s',q:'Describe the most powerful corporate prayer experience you have ever been part of. What made it different from ordinary group prayer?'},
{t:'s',q:'What is your responsibility as a leader in cultivating genuine corporate intercession rather than just managing a prayer meeting?'},
{t:'s',q:'What specific changes would you make to the prayer culture in your ministry team based on what Acts 1:14 models?'}
]},
{day:5,stage:1,title:'Fasting and intercession',ref:'Isaiah 58:6-9',dev:'Is not this the kind of fasting I have chosen: to loose chains of injustice, to set the oppressed free? Fasting is not hunger management. It is a weapon. When combined with intercession it creates a spiritual environment where chains break.',q:[
{t:'s',q:'How has fasting changed the effectiveness or depth of your intercession in the past?'},
{t:'m',q:'Isaiah 58:9 says when you fast and cry out, what will the Lord say?',o:['Wait','Here I am','Pray more','Be still']},
{t:'s',q:'Isaiah 58 connects fasting to justice and liberation of the oppressed. How does that connect to intercession for your community?'},
{t:'s',q:'Design a fasting and intercession rhythm for the next 30 days. What will you fast, when, and what will you intercede for?'},
{t:'s',q:'What specific breakthrough do you believe requires the combination of fasting and sustained intercession?'}
]},
{day:6,stage:1,title:'Praying for leaders',ref:'1 Timothy 2:1-2',dev:'Paul urged intercession for kings and all in authority — under Nero. Not a Christian government. Under active persecution. Intercession for leaders is not conditional on whether you agree with them.',q:[
{t:'s',q:'How consistently do you pray for Apostle Everett and the senior leadership of SIM? What does that prayer look like specifically?'},
{t:'m',q:'1 Timothy 2:2 says we should pray for those in authority so that we may live peaceful and quiet lives in all what?',o:['Joy and peace','Godliness and holiness','Prosperity and health','Wisdom and power']},
{t:'s',q:'What is the spiritual effect on a leader when people under their covering consistently intercede for them?'},
{t:'s',q:'Who are the five people in authority over your life right now that you commit to pray for consistently?'},
{t:'s',q:'Write a specific intercessory prayer for Apostle Everett right now — covering his health, anointing, family, vision and protection.'}
]},
{day:7,stage:1,title:'Night watches and early prayer',ref:'Psalm 119:62',dev:'At midnight I rise to give you thanks. David wrote that as a practice. The hours before dawn have historically been the most productive hours of prayer across every great move of God.',q:[
{t:'s',q:'What is your current morning prayer practice? What time do you typically begin and what does it look like?'},
{t:'m',q:'Psalm 119:62 says David rises at midnight to do what?',o:['Worship with music','Give thanks for God\'s righteous laws','Pray for enemies','Read the Torah']},
{t:'s',q:'Have you ever experienced praying in the night hours or very early morning? What was different about that experience?'},
{t:'s',q:'What would it look like for you to establish a consistent early morning or night watch prayer practice for the duration of this 90-day program?'},
{t:'s',q:'What is the connection between personal sacrifice in prayer — giving up sleep, comfort, convenience — and the breakthrough you are believing for?'}
]},
{day:8,stage:1,title:'Praying for the lost',ref:'Romans 10:1',dev:"Paul's heart's desire and prayer was for people who had not yet received Christ. The heart of an intercessor always bends toward the unreached.",q:[
{t:'s',q:'Who are the specific unsaved people you are currently interceding for by name? List them.'},
{t:'m',q:"Romans 10:1 says Paul's heart's desire and prayer to God for the Israelites is what?",o:['That they would respect him','That they may be saved','That they would stop persecuting him','That God would judge them']},
{t:'s',q:'How does intercession for the lost change your personal attitude toward people who are far from God?'},
{t:'s',q:'What is the connection between sustained intercession and the fruit of evangelism in a ministry context?'},
{t:'s',q:'Write a specific intercessory prayer for three people by name who do not yet know Christ.'}
]},
{day:9,stage:1,title:'Spiritual mapping your territory',ref:'Joshua 18:8',dev:'Go and make a survey of the land. Joshua sent men to walk the territory and come back with a written description before they claimed it. You cannot pray effectively for what you do not understand.',q:[
{t:'s',q:'How well do you know the spiritual climate of the community SIM is called to reach?'},
{t:'m',q:"Joshua 18:8 says the men were to make a survey of the land and write a description. What were they to do with it?",o:['Post it publicly','Bring it back to Joshua','Keep it for themselves','Burn it after reading']},
{t:'s',q:'What are the primary spiritual strongholds or challenges in your city that require sustained intercessory prayer?'},
{t:'s',q:'How does understanding the spiritual history of a place sharpen the focus of your intercession?'},
{t:'s',q:'Write a spiritual assessment of your city and a corresponding intercessory prayer targeting what you identify.'}
]},
{day:10,stage:1,title:'The prayer of agreement',ref:'Matthew 18:19-20',dev:'If two of you agree about anything they ask for, it will be done. The prayer of agreement is not two people saying the same words — it is two people in genuine spiritual alignment making the same request with unified hearts.',q:[
{t:'s',q:'What is the difference between agreeing in words during prayer and genuine spiritual agreement? Have you experienced both?'},
{t:'m',q:'Matthew 18:20 says "For where two or three gather in my name, there am I" doing what?',o:['Listening only','With them','Answering immediately','Sending angels']},
{t:'s',q:'Who do you currently have a genuine prayer agreement with — someone you can call at any time and stand in agreement with?'},
{t:'s',q:'Is there a specific prayer request you have been carrying alone that you need to bring into agreement with another believer?'},
{t:'s',q:'Write out one specific thing you are believing God for and identify the person you will contact this week to enter into prayer agreement.'}
]},
{day:11,stage:1,title:'Declarations and decrees',ref:'Job 22:28',dev:'You will decree a thing and it will be established for you. A decree is different from a petition. A petition asks. A decree declares what is already settled in heaven into the earth realm.',q:[
{t:'s',q:'What is the difference between petitioning God and making a decree or declaration? When is each appropriate?'},
{t:'m',q:'Job 22:28 says you will decree a thing and it will be established for you and light will shine where?',o:['In the darkness',"On your ways","In your enemies' camp","Before kings"]},
{t:'s',q:'What scripturally-grounded declarations are you currently making over your life, your ministry and your family?'},
{t:'s',q:'How do you ensure that your declarations are rooted in scripture and the will of God rather than personal desire?'},
{t:'s',q:'Write five bold scriptural declarations over your assignment in SIM. Base each on a specific scripture and speak it in first person.'}
]},
{day:12,stage:1,title:'Praying through opposition',ref:'Daniel 10:12-13',dev:'Since the first day you set your mind to gain understanding, your words were heard. The answer had been dispatched from day one. Daniel prayed twenty-one days. The answer was always coming — he just had to hold his position.',q:[
{t:'s',q:'Have you ever prayed for something consistently over weeks or months before seeing the breakthrough? What kept you going?'},
{t:'m',q:'Daniel 10:13 says the prince of the Persian kingdom resisted the angel for how many days?',o:['Seven','Fourteen','Twenty-one','Forty']},
{t:'s',q:'What does Daniel 10 teach you about persisting in intercession even when you see no immediate evidence of movement?'},
{t:'s',q:'What prayer are you currently most tempted to give up on? How does Daniel\'s example speak to that?'},
{t:'s',q:'Write a commitment to one specific prayer you will not give up on for the remainder of this 90-day program.'}
]},
{day:13,stage:1,title:'Thanksgiving as intercession',ref:'Philippians 4:6-7',dev:'In everything by prayer and petition with thanksgiving present your requests to God. Thanksgiving is not the reward you give God after He answers — it is the posture you carry while you wait.',q:[
{t:'s',q:'How much of your prayer time is thanksgiving versus petition? What does that ratio reveal?'},
{t:'m',q:'Philippians 4:7 says the peace of God which surpasses all understanding will guard what?',o:['Your home','Your health','Your hearts and minds in Christ Jesus','Your ministry']},
{t:'s',q:'What is the spiritual effect of entering intercession with thanksgiving first, before you make your requests?'},
{t:'s',q:'Name ten specific things you are genuinely thankful to God for right now — specific, personal, recent.'},
{t:'s',q:'How does sustained thanksgiving change your posture as a leader when prayers seem delayed?'}
]},
{day:14,stage:1,title:'Listening prayer',ref:'1 Samuel 3:9-10',dev:'Speak Lord, for your servant is listening. Most prayer is a monologue directed at God. Listening prayer is dialogue. It requires silence, patience and the willingness to receive something unexpected.',q:[
{t:'s',q:'How much of your prayer time involves listening as opposed to speaking? Be honest about the ratio.'},
{t:'m',q:'After Eli instructed Samuel what to say, Samuel responded with what words?',o:['Here I am Lord','Yes Lord I hear you','Speak Lord your servant is listening','What do you want me to do?']},
{t:'s',q:'What practical disciplines help you be still and listen when you pray? What makes it difficult?'},
{t:'s',q:'What is something specific you believe God has spoken to you recently in a listening prayer? How are you responding?'},
{t:'s',q:'Spend ten minutes in silence after completing these questions. Then write what you sensed, heard, felt or received during that time.'}
]},
{day:15,stage:1,title:'Intercessory identity',ref:'Ezekiel 22:30',dev:'I looked for someone among them who would build up the wall and stand before me in the gap — but I found no one. The most haunting verse in the Old Testament. God was looking — and found no one. Intercessory identity means understanding that God is looking for you specifically.',q:[
{t:'s',q:'What does it mean to you that God is specifically looking for intercessors? Does that feel like a burden or a privilege?'},
{t:'m',q:'Ezekiel 22:30 says God looked for someone to stand in the gap so He would not have to do what?',o:['Send judgment','Destroy the land','Leave the people','Raise up enemies']},
{t:'s',q:'How does understanding intercession as an identity rather than an activity change how you approach prayer?'},
{t:'s',q:'What would it look like to fully accept the assignment of intercessor as a core part of who you are as a leader?'},
{t:'s',q:'Write a personal intercessory identity statement — who God has called you to be in prayer, what walls you are posted on, what gaps you are standing in.'}
]},
{day:16,stage:1,title:'Warfare prayer',ref:'2 Corinthians 10:3-5',dev:'The weapons we fight with have divine power to demolish strongholds. A warfare prayer is not louder than normal prayer — it is more targeted. It knows what it is fighting and what weapons to use.',q:[
{t:'s',q:'What is the difference between praying for something and waging warfare in prayer over something?'},
{t:'m',q:'2 Corinthians 10:5 says we demolish arguments and take captive what?',o:['Our enemies','Every thought','Evil spirits','All sin']},
{t:'s',q:'What specific strongholds in your own mind, in your ministry or in your community require warfare prayer?'},
{t:'s',q:'How do you identify what you are actually fighting so that your warfare prayer is precise rather than general?'},
{t:'s',q:'Write a targeted warfare prayer over one specific stronghold in your ministry environment.'}
]},
{day:17,stage:1,title:'Praying for revival',ref:'Habakkuk 3:2',dev:'Lord, repeat your deeds in our time. Habakkuk had heard about what God did in previous generations and prayed: do it again. Revival prayer is historical prayer — anchored in what God has done — applied to the present.',q:[
{t:'s',q:'What does revival mean to you beyond the word itself? What specific things would change in SIM and your city if revival came?'},
{t:'m',q:'Habakkuk 3:2 says "In wrath remember" what?',o:['Justice','Your people','Mercy','Your covenant']},
{t:'s',q:'What do you know about historic revivals that shapes your prayer for revival in your generation?'},
{t:'s',q:'What is your personal responsibility in contending for revival in prayer? How committed are you?'},
{t:'s',q:'Write a revival prayer for SIM and your city — specific, scripture-grounded, urgent and expectant.'}
]},
{day:18,stage:1,title:'Praying for healing',ref:'James 5:14-16',dev:'The prayer offered in faith will make the sick person well. The prayer of a righteous person is powerful and effective. Healing prayer is not a specialty — it is a normal expression of Kingdom authority.',q:[
{t:'s',q:'What is your theology of healing prayer? Do you pray for healing with genuine faith or with theological hedging? Be honest.'},
{t:'m',q:'James 5:16 says the prayer of a righteous person is what?',o:['Always answered','Powerful and effective','Heard by God','Better than others\'']},
{t:'s',q:'Describe the most significant healing you have witnessed in response to prayer. What happened?'},
{t:'s',q:'What is the connection between the confession of sin in James 5:16 and the effectiveness of healing prayer?'},
{t:'s',q:'Who in your sphere right now needs healing prayer? Write their name and pray specifically for them.'}
]},
{day:19,stage:1,title:'Praying for your enemies',ref:'Matthew 5:44',dev:'Love your enemies and pray for those who persecute you. Jesus did not say think warmly about them. He said pray for them. Intercessory prayer for someone who has wronged you requires a heart that has been transformed.',q:[
{t:'s',q:'Is there someone in your life or ministry who has opposed or hurt you that you have been avoiding praying for? Name them honestly.'},
{t:'m',q:'Matthew 5:44 says love your enemies and pray for those who do what to you?',o:['Disagree with you','Persecute you','Misunderstand you','Leave your ministry']},
{t:'s',q:'What does praying for an enemy do to your own heart over time? Have you experienced this?'},
{t:'s',q:'How is praying for enemies an act of spiritual warfare rather than just personal virtue?'},
{t:'s',q:'Write an intercessory prayer for someone who has wronged you — praying for their blessing and flourishing. Do not include your grievance.'}
]},
{day:20,stage:1,title:'Building a house of prayer',ref:'Isaiah 56:7',dev:'My house will be called a house of prayer for all nations. Not a house of programs. Not a house of performance. A house of prayer. This is the identity God assigned to His dwelling place — and it is the identity He assigns to yours.',q:[
{t:'s',q:'Would your ministry currently be described by others as a house of prayer? Why or why not?'},
{t:'m',q:"Isaiah 56:7 says God's house will be called a house of prayer for whom?",o:['Israel only','All nations','The righteous','Those who seek Him']},
{t:'s',q:'What practical steps would it take to shift the culture of your ministry toward a genuine house of prayer identity?'},
{t:'s',q:'What is the relationship between a culture of prayer in a ministry and the level of supernatural activity it experiences?'},
{t:'s',q:'Write a vision statement for what a house of prayer culture would look like in your specific ministry context.'}
]},
{day:21,stage:1,title:'Sustaining a prayer life long-term',ref:'Luke 18:1',dev:'Jesus told his disciples a parable to show them that they should always pray and not give up. The primary threat to a prayer life is not theological disagreement — it is discouragement. The enemy just needs you to be too tired or too busy.',q:[
{t:'s',q:'What has been the primary reason you have allowed your prayer life to diminish in past seasons?'},
{t:'m',q:'Luke 18:1 says Jesus told the parable to show that they should always pray and not do what?',o:['Doubt','Rush','Give up','Pray alone']},
{t:'s',q:'What systems, rhythms or accountability structures do you have in place to sustain your prayer life over years rather than just seasons?'},
{t:'s',q:'What does a sustainable long-term prayer life look like for someone with your specific responsibilities?'},
{t:'s',q:'Write a personal prayer covenant — a commitment to God about your prayer life for the remainder of this year.'}
]},
{day:22,stage:1,title:'Stage 1 reflection — Intercession',ref:'1 Kings 18:41-46',dev:'Elijah bent down to the ground and put his face between his knees. He told his servant to go and look. Seven times the servant came back with nothing. On the seventh time — a cloud the size of a man\'s hand. Then the rain came. How is your prayer posture?',q:[
{t:'s',q:'What has been the most significant shift in your prayer life over these first 22 days?'},
{t:'m',q:"Elijah's servant went to look toward the sea how many times before seeing the cloud?",o:['Three','Five','Seven','Ten']},
{t:'s',q:"Which day's content on intercession most challenged or convicted you? Why?"},
{t:'s',q:'What specific prayer are you still holding — like Elijah bent over between his knees — that has not yet broken through?'},
{t:'s',q:'Write a prayer of commitment going into Stage 2 — what you are carrying from Stage 1 into the next 23 days of spiritual warfare.'}
]},
{day:23,stage:2,title:'Understanding the enemy',ref:'1 Peter 5:8',dev:'Your adversary the devil prowls around like a roaring lion, seeking someone to devour. A leader who does not take the enemy seriously will be ambushed. A leader obsessed with the enemy will be paralyzed. The balanced posture is watchfulness.',q:[
{t:'s',q:'How do you currently think about the enemy\'s role in the challenges you face? Are you under-aware or over-aware?'},
{t:'m',q:'1 Peter 5:8 says the devil prowls around like a roaring lion seeking whom?',o:['The weak only','The unsaved','Someone to devour','Leaders specifically']},
{t:'s',q:'What is the difference between spiritual warfare and giving the enemy more attention than he deserves?'},
{t:'s',q:'Where in your ministry have you recently seen clear enemy opposition rather than just natural difficulty? How did you respond?'},
{t:'s',q:'What does a sober-minded, watchful posture look like in your day-to-day leadership — not paranoid, not naive?'}
]},
{day:24,stage:2,title:'The full armor of God',ref:'Ephesians 6:14-17',dev:'Stand firm with the belt of truth buckled around your waist. Every piece of the armor is defensive except one — the sword of the Spirit. The armor is not for the timid. You do not put on armor to run. You put it on to stand.',q:[
{t:'s',q:'Walk through each piece of the armor in Ephesians 6:14-17. Which piece do you wear most consistently? Which do you most neglect?'},
{t:'m',q:'Ephesians 6:17 calls the Word of God the sword of the Spirit. This is the only piece of armor that is what?',o:['Most important','Offensive rather than defensive','Given by angels','Used in worship only']},
{t:'s',q:'What does it look like practically to put on the full armor of God — not as a ritual but as an intentional daily act?'},
{t:'s',q:'Where in your current leadership season are you most vulnerable to attack? Which piece of armor needs strengthening?'},
{t:'s',q:'Write a daily armor declaration — speaking each piece over yourself in first person with specific application to your current assignment.'}
]},
{day:25,stage:2,title:'Strongholds in the mind',ref:'2 Corinthians 10:4-5',dev:'The weapons we fight with have divine power to demolish strongholds. The primary battlefield is not your city or your ministry — it is your mind. A stronghold is a thought pattern so entrenched it has become a lens through which you interpret everything.',q:[
{t:'s',q:'What is a stronghold? Give a definition in your own words that goes beyond the churched version of the word.'},
{t:'m',q:'2 Corinthians 10:5 says we take captive every thought to make it obedient to whom?',o:['Scripture','The Holy Spirit','Christ','Our pastors']},
{t:'s',q:'What strongholds — recurring thought patterns, beliefs, fears or narratives — have you identified in your own mind that affect your leadership?'},
{t:'s',q:'How do you practically demolish a mental stronghold? What is the actual process?'},
{t:'s',q:'Name one specific stronghold you are targeting in your mind right now. Write a warfare declaration against it using scripture.'}
]},
{day:26,stage:2,title:'Generational patterns',ref:'Exodus 20:5-6',dev:'I punish children for the sin of the parents to the third and fourth generation — but show love to a thousand generations of those who love me. Generational patterns are real. But they are not destiny. The bloodline of Christ breaks every curse.',q:[
{t:'s',q:'What patterns — positive or negative — do you recognize in your family line that have shown up in your own life?'},
{t:'m',q:'Exodus 20:6 says God shows love to how many generations of those who love Him?',o:['Third and fourth','Ten','A hundred','A thousand']},
{t:'s',q:'How do you biblically engage with generational curses without falling into either dismissal or obsession?'},
{t:'s',q:'What generational blessing do you want to establish through your life that has not existed in your bloodline before you?'},
{t:'s',q:'Write a prayer of generational blessing — breaking patterns that have held your family back and declaring a new legacy through the blood of Jesus.'}
]},
{day:27,stage:2,title:'Territorial spirits',ref:'Daniel 10:20',dev:'The prince of Persia was resisting the angel sent to Daniel. There are spiritual entities assigned to territories. They maintain spiritual climates that affect everything within their jurisdiction.',q:[
{t:'s',q:'What do you understand about territorial spirits from scripture? How does this shape your intercession for your city?'},
{t:'m',q:'Daniel 10:20 mentions the prince of Persia and then which other territorial prince?',o:['Prince of Babylon','Prince of Greece','Prince of Rome','Prince of Egypt']},
{t:'s',q:'What do you believe are the primary spiritual structures governing your city — what seems to characterize the spiritual climate there?'},
{t:'s',q:'How does intercession against territorial spirits differ from general spiritual warfare? What makes it require greater corporate agreement?'},
{t:'s',q:'Write a territorial intercession for your city — naming what you are confronting and declaring the Kingdom of God over the region.'}
]},
{day:28,stage:2,title:'Spiritual discernment',ref:'1 Corinthians 12:10',dev:'To another distinguishing between spirits. Discernment is a gift that must be developed. An undeveloped gift produces easy deception. An overdeveloped fixation produces a suspicious leader. Maturity finds the balance.',q:[
{t:'s',q:'How would you honestly rate your gift of spiritual discernment on a scale of 1-10? What has shaped that rating?'},
{t:'m',q:'1 Corinthians 12:10 lists distinguishing between spirits as a gift of the Spirit. What does this gift enable a leader to do?',o:['See angels',"Know people's sins","Distinguish between what is from God, self or the enemy","Read minds"]},
{t:'s',q:'Describe a time when your discernment accurately identified a spiritual dynamic in a person or situation. What did that discernment produce?'},
{t:'s',q:'Describe a time when what you thought was discernment turned out to be suspicion or projection. What did you learn?'},
{t:'s',q:'How do you develop and test spiritual discernment in a way that keeps it accountable?'}
]},
{day:29,stage:2,title:'The blood of Jesus',ref:'Revelation 12:11',dev:'They triumphed over him by the blood of the Lamb and by the word of their testimony. The blood of Jesus is not a metaphor. It is the most powerful weapon in the arsenal of the believer. It speaks. It cleanses. It defeats.',q:[
{t:'s',q:'How do you currently apply the blood of Jesus in your prayer and spiritual warfare? Is it a formula or a living reality?'},
{t:'m',q:'Revelation 12:11 says they overcame the enemy by the blood of the Lamb and by the word of their what?',o:['Prayer','Testimony','Faith','Obedience']},
{t:'s',q:'What does it mean that the blood of Jesus "speaks" according to Hebrews 12:24? What does it say?'},
{t:'s',q:'How does understanding the power of the blood change your posture in spiritual warfare — your confidence, your authority?'},
{t:'s',q:'Write a declaration applying the blood of Jesus over your life, your family, your ministry and your assignment.'}
]},
{day:30,stage:2,title:'Breaking cycles',ref:'Galatians 5:1',dev:'It is for freedom that Christ has set us free. Stand firm and do not let yourselves be burdened again by a yoke of slavery. Freedom is not a one-time event — it is a position that must be maintained.',q:[
{t:'s',q:'What cycles — behavioral, emotional, relational or spiritual — have you broken that you are now responsible to maintain freedom from?'},
{t:'m',q:'Galatians 5:1 says stand firm and do not let yourselves be burdened again by a yoke of what?',o:['Sin','The law','Slavery','The flesh']},
{t:'s',q:'What is the difference between a cycle being broken and a cycle being healed? Which have you experienced?'},
{t:'s',q:'What cycle in your life or ministry is currently trying to re-establish itself? What warfare strategy are you using?'},
{t:'s',q:'Write a freedom declaration over yourself — naming what you have been set free from, what you refuse to return to and what you are walking toward.'}
]},
{day:31,stage:2,title:'Spiritual authority in the home',ref:'Joshua 24:15',dev:'As for me and my household, we will serve the Lord. Joshua did not wait for a congregational vote. He made a covenant declaration on behalf of his household. A leader who cannot exercise spiritual authority in their home has a significant gap in their overall authority.',q:[
{t:'s',q:'How would you honestly describe the spiritual atmosphere of your home? Is it what you want it to be?'},
{t:'m',q:"Joshua 24:15 ends with Joshua making a declaration that begins with 'as for me' and includes whom else?",o:['His army','His tribe','His household','His nation']},
{t:'s',q:'What specific spiritual practices, prayers and declarations do you bring into your home consistently?'},
{t:'s',q:'If there is spiritual warfare affecting your home environment right now — what is the nature of it and how are you engaging it?'},
{t:'s',q:'Write a covenant declaration for your household — what you are committing to spiritually and what atmosphere you are establishing.'}
]},
{day:32,stage:2,title:'Warfare and worship',ref:'2 Chronicles 20:21-22',dev:'Jehoshaphat appointed singers to go out at the head of the army. As they began to sing and praise, the Lord set ambushes against the enemy and they were defeated. The worshippers were in front, not the army.',q:[
{t:'s',q:'What is the relationship between genuine worship and spiritual breakthrough in warfare? Have you experienced this?'},
{t:'m',q:'In 2 Chronicles 20:22, the enemies were defeated as the people began to do what?',o:['Fight','Pray','Sing and praise','Advance']},
{t:'s',q:'How does worship as a warfare strategy differ from worship as a performance or religious exercise?'},
{t:'s',q:'Describe a specific moment in a worship experience where you sensed spiritual breakthrough.'},
{t:'s',q:'How do you cultivate an atmosphere of warfare worship in the ministry context you lead?'}
]},
{day:33,stage:2,title:'The name of Jesus',ref:'Philippians 2:9-10',dev:'God gave him the name that is above every name, that at the name of Jesus every knee should bow in heaven and on earth and under the earth. Every name of every spirit, every principality, every disease — all bow at one name.',q:[
{t:'s',q:'How much authority do you exercise in the name of Jesus? Is it a formula or a reality you walk in?'},
{t:'m',q:'Philippians 2:10 says at the name of Jesus every knee should bow in heaven and on earth and where else?',o:['In the sea','Under the earth','In the nations','In darkness']},
{t:'s',q:'What is the difference between using the name of Jesus as a formula and actually exercising authority in that name?'},
{t:'s',q:'Describe a specific moment when you commanded something in the name of Jesus and witnessed a result.'},
{t:'s',q:'Write a declaration exercising authority in the name of Jesus over three specific situations — one personal, one in your ministry and one over your city.'}
]},
{day:34,stage:2,title:'Spiritual rest in warfare',ref:'Psalm 46:10',dev:'Be still and know that I am God. This is a warfare psalm. Psalm 46 describes nations in chaos, mountains falling into the sea — and God says: stop. Be still. Know. The most powerful act in a warfare season is sometimes to rest in the certainty of who God is.',q:[
{t:'s',q:'What is the role of spiritual rest and stillness in a season of intensive spiritual warfare?'},
{t:'m',q:"Psalm 46:10 says 'Be still and know that I am God; I will be exalted among the nations, I will be exalted' where?",o:['In the heavens','In the earth','In your heart','In the church']},
{t:'s',q:'How do you distinguish between resting in God during warfare and passively retreating from your assignment?'},
{t:'s',q:'What is the most difficult thing about being still when your ministry feels like it is under attack?'},
{t:'s',q:'Design a warfare rest practice for yourself — a specific way you will enter spiritual stillness in intense seasons.'}
]},
{day:35,stage:2,title:'Deliverance ministry basics',ref:'Mark 16:17',dev:'In my name they will drive out demons. Jesus did not say some of them will. He said they will. Deliverance ministry is not a specialty — it is a normal expression of Kingdom authority. Most leaders avoid it not because they do not believe in it but because they have never been trained.',q:[
{t:'s',q:'What is your current understanding of and experience with deliverance ministry? Be honest about both your theology and practice.'},
{t:'m',q:'Mark 16:17 lists driving out demons as one of the signs that will accompany whom?',o:['Apostles only','Those who believe','Ordained ministers','People who fast']},
{t:'s',q:"What is the difference between addressing a demonic influence in a person's life and addressing a mental health need?"},
{t:'s',q:'What safeguards should a leader have in place before engaging in deliverance ministry?'},
{t:'s',q:'Write what you believe to be your current level of readiness in deliverance ministry and what you need to develop.'}
]},
{day:36,stage:2,title:'Guarding your anointing',ref:'1 Samuel 16:14',dev:'The Spirit of the Lord had departed from Saul. Eight words. The most sobering eight words in the Old Testament for any leader. The anointing is not a permanent possession that cannot be forfeited. It is a trust.',q:[
{t:'s',q:'What do you believe causes an anointing to diminish or depart in a leader? What does scripture and experience tell you?'},
{t:'m',q:'1 Samuel 16:14 says after the Spirit of the Lord departed from Saul, what came upon him?',o:['Depression','A lying spirit','A tormenting spirit from the Lord','Confusion']},
{t:'s',q:'How do you actively steward and protect the anointing on your life — what disciplines, boundaries and practices guard it?'},
{t:'s',q:'Is there anything in your current life or leadership that you sense is creating friction with the anointing?'},
{t:'s',q:'Write a consecration prayer — dedicating yourself, your gifts and your anointing to God and asking for His covering and protection.'}
]},
{day:37,stage:2,title:'Spiritual covering and accountability',ref:'Ecclesiastes 4:12',dev:'A cord of three strands is not quickly broken. Spiritual warfare without covering is one strand — vulnerable and isolated. The enemy targets the uncovered leader. Accountability is not weakness. It is warfare strategy.',q:[
{t:'s',q:'Who provides spiritual covering over your life right now? What does that covering relationship actually look like in practice?'},
{t:'m',q:'Ecclesiastes 4:12 says a cord of three strands is not quickly what?',o:['Separated','Broken','Undone','Divided']},
{t:'s',q:'How does spiritual covering change your vulnerability in warfare? What happens to a leader who operates without it?'},
{t:'s',q:'Are there areas of your life where you are currently uncovered — operating outside accountability?'},
{t:'s',q:'Write a description of your ideal spiritual covering structure — who you are under, what you are covered by, how accountability flows.'}
]},
{day:38,stage:2,title:'Perseverance in warfare',ref:'Galatians 6:9',dev:'Let us not become weary in doing good, for at the proper time we will reap a harvest if we do not give up. Warfare fatigue is real. The enemy does not always come with a frontal assault — sometimes he just outlasts you.',q:[
{t:'s',q:'What is the greatest source of warfare fatigue in your leadership right now?'},
{t:'m',q:'Galatians 6:9 promises a harvest at the proper time to those who do not do what?',o:['Doubt','Give up','Sin','Complain']},
{t:'s',q:'How do you discern the difference between a warfare season you need to push through and a direction God is actually redirecting?'},
{t:'s',q:'Describe a warfare season you persevered through. What did that perseverance produce on the other side?'},
{t:'s',q:'What spiritual practices sustain you through extended seasons of warfare when breakthrough has not yet come?'}
]},
{day:39,stage:2,title:'Cleansing environments',ref:'Acts 19:18-19',dev:'Many who believed came and openly confessed what they had done. Those who had practiced sorcery burned their scrolls publicly. The word of the Lord spread widely and grew in power. The environment changed when the objects changed.',q:[
{t:'s',q:'What do you understand about the spiritual significance of objects, environments and spaces in relation to warfare?'},
{t:'m',q:'Acts 19:20 says after the scrolls were burned, the word of the Lord spread widely and did what?',o:['Was questioned','Grew in power','Was resisted','Reached Rome']},
{t:'s',q:'Have you ever cleansed a space spiritually? What did that look like and what resulted?'},
{t:'s',q:'What environments in your life or ministry might currently need spiritual cleansing and consecration?'},
{t:'s',q:'Write a prayer of consecration for your primary ministry space — declaring it holy ground, cleansed by the blood of Jesus and set apart for God.'}
]},
{day:40,stage:2,title:'Walking in victory',ref:'Romans 8:37',dev:'No, in all these things we are more than conquerors through him who loved us. Not conquerors — more than conquerors. Paul wrote that from chains. The victory he describes is not the absence of opposition. It is a position of authority maintained even in the middle of it.',q:[
{t:'s',q:'What does it actually mean to be more than a conqueror — not just to survive warfare but to be positioned above it?'},
{t:'m',q:'Romans 8:37 says we are more than conquerors through whom?',o:['Our faith','Our prayers','Him who loved us','The Holy Spirit']},
{t:'s',q:'How does your daily experience of spiritual warfare align with the identity Paul describes? Where is the gap?'},
{t:'s',q:'What would it look like to lead from a position of victory rather than always fighting from a position of need?'},
{t:'s',q:'Write a victory declaration for your life and ministry based on Romans 8:37 — not what you are hoping for but what you are declaring as already settled through Christ.'}
]},
{day:41,stage:2,title:'Spiritual warfare and mental health',ref:'Philippians 4:7',dev:'The peace of God which transcends all understanding will guard your hearts and minds in Christ Jesus. Not all mental and emotional struggles are purely spiritual — but none of them are purely natural either. A mature leader holds both realities with wisdom.',q:[
{t:'s',q:'How do you currently navigate the intersection between spiritual warfare and mental and emotional health in your own life?'},
{t:'m',q:'Philippians 4:7 says the peace of God will guard your hearts and minds in what?',o:['Prayer','Worship','Christ Jesus','Your faith']},
{t:'s',q:'What is the danger of over-spiritualizing mental health challenges? What is the danger of under-spiritualizing them?'},
{t:'s',q:'How do you lead someone who is experiencing both mental health struggles and spiritual warfare at the same time?'},
{t:'s',q:'What does your own mental and emotional health look like right now? What are you doing to steward it?'}
]},
{day:42,stage:2,title:'The spirit of fear',ref:'2 Timothy 1:7',dev:'The Spirit God gave us does not make us timid, but gives us power, love and self-discipline. Fear is not just an emotion — it is a spirit. A spirit of fear in a leader paralyzes decision-making, shrinks vision and poisons relationships.',q:[
{t:'s',q:'Where does fear most consistently show up in your leadership? What decisions or relationships trigger it?'},
{t:'m',q:'2 Timothy 1:7 says God has not given us a spirit of fear but of power and love and what else?',o:['Peace','Faith','Self-discipline','Courage']},
{t:'s',q:'What is the difference between healthy caution and a spirit of fear? How do you tell them apart in yourself?'},
{t:'s',q:'What decision or action have you been avoiding because of fear that you need to make or take?'},
{t:'s',q:'Write a declaration breaking the spirit of fear over your life and ministry — using 2 Timothy 1:7 and other scriptures alive to you right now.'}
]},
{day:43,stage:2,title:'Warfare through praise',ref:'Psalm 149:6-9',dev:'May the praise of God be in their mouths and a double-edged sword in their hands. Praise is not just worship — it is a weapon. Praise with a sword in your hand. Worship that binds kings.',q:[
{t:'s',q:'How has your understanding of praise as a warfare weapon developed over your walk with God?'},
{t:'m',q:'Psalm 149:6 says the praise of God should be in their mouths and what should be in their hands?',o:['A shield','A double-edged sword','A staff','The Word']},
{t:'s',q:'Describe a specific time when breakthrough came through sustained praise rather than warfare prayer. What happened?'},
{t:'s',q:'What is the relationship between the level of genuine praise in a ministry culture and its effectiveness in spiritual warfare?'},
{t:'s',q:'How would you shift your team toward understanding praise as warfare rather than just a service element?'}
]},
{day:44,stage:2,title:'Protecting your family in warfare',ref:'Nehemiah 4:14',dev:"Don't be afraid. Remember the Lord and fight for your families. Nehemiah's warriors built with one hand and held a weapon with the other. Family protection in spiritual warfare requires intentional, consistent, specific intercession.",q:[
{t:'s',q:'What specific spiritual warfare strategy do you have in place for the protection of your family?'},
{t:'m',q:'Nehemiah 4:14 instructs the people to fight for their families and also for what?',o:['Their king','Their land and their homes','Their livelihood','Their nation only']},
{t:'s',q:'What are the primary spiritual threats to your family in this season? How are you engaging each one?'},
{t:'s',q:'How do you balance fighting for your family in prayer with also being present and engaged with them relationally?'},
{t:'s',q:'Write a specific warfare prayer covering each member of your immediate family by name.'}
]},
{day:45,stage:2,title:'Stage 2 reflection — Spiritual Warfare',ref:'Revelation 12:10-11',dev:'Now have come the salvation and the power and the kingdom of our God. For the accuser has been hurled down. They triumphed over him by the blood of the Lamb and by the word of their testimony. Stage 2 ends here. The enemy has been hurled down. Stand in that.',q:[
{t:'s',q:'What is the most significant shift in your understanding of spiritual warfare from these 23 days?'},
{t:'m',q:'Revelation 12:10 says the accuser accuses our brothers and sisters before God how often?',o:['Occasionally','In seasons of weakness','Day and night','Only at the end of the age']},
{t:'s',q:'Which area of spiritual warfare do you feel most equipped in now? Which still feels underdeveloped?'},
{t:'s',q:'What specific victory have you seen or experienced during Stage 2?'},
{t:'s',q:'Write a Stage 2 commissioning prayer — what you are carrying into Stage 3 and what you are asking God to build through the next 22 days of Team Dynamics.'}
]},
{day:46,stage:3,title:'The theology of team',ref:'1 Corinthians 12:12-13',dev:'Just as a body has many parts but forms one body, so it is with Christ. A team is not a convenience. It is a theological statement about how God designed His people to function.',q:[
{t:'s',q:'What is your theology of team? Do you genuinely believe you need others or do you operate as though team is useful but optional?'},
{t:'m',q:'1 Corinthians 12:12 says just as a body has many parts but forms one body, so it is with whom?',o:['The church only','Israel','Christ','Leadership']},
{t:'s',q:'What parts of the body metaphor most resonate with your current team situation — what parts are functioning, what parts are missing or wounded?'},
{t:'s',q:'Where has your tendency toward independence cost your team effectiveness?'},
{t:'s',q:'Write a theological statement about why you believe team is not optional — grounded in scripture, honest about your own journey.'}
]},
{day:47,stage:3,title:'Identifying your team\'s gifts',ref:'Romans 12:4-8',dev:'We have different gifts, according to the grace given to each of us. The problem in most ministry teams is not a shortage of gifts — it is that no one has taken the time to identify and deploy them intentionally.',q:[
{t:'s',q:'How well do you know the spiritual gifts of each person on your immediate ministry team?'},
{t:'m',q:'Romans 12:6 says we have different gifts according to the grace given to each of us. What does this imply about the source of spiritual gifts?',o:['Our personality',"God's sovereign assignment","Our spiritual maturity","Our choice"]},
{t:'s',q:'Name each person on your team and the primary gift you observe in them. If you cannot do this for everyone — what does that tell you?'},
{t:'s',q:'Where are people on your team currently operating outside their primary gift? What is that costing the team?'},
{t:'s',q:'Write a gift deployment plan for your team — who has what gift and what adjustments would put each person in their primary gifting lane.'}
]},
{day:48,stage:3,title:'Building trust on a team',ref:'Proverbs 20:6',dev:'Many claim to have unfailing love, but a faithful person — who can find? Trust is not built in a moment. It is accumulated over a thousand small choices to be honest when dishonesty was easier and consistent when inconsistency had an excuse.',q:[
{t:'s',q:'On a scale of 1-10 how much do the people on your team trust you? What evidence supports that number?'},
{t:'m',q:'Proverbs 20:6 says many claim to have unfailing love but a faithful person is what?',o:['Easy to find','Hard to develop','Who can find?','Rare but present']},
{t:'s',q:'What specific behaviors have you demonstrated consistently that have built trust in your team? What behaviors have eroded it?'},
{t:'s',q:'Is there a member of your team who does not fully trust you yet? What do you believe is at the root of that?'},
{t:'s',q:'Write a personal trust audit — rating yourself in five areas and naming one action step for each area that needs improvement.'}
]},
{day:49,stage:3,title:'Communication as a leadership skill',ref:'Ephesians 4:15',dev:'Speaking the truth in love we will grow to become the mature body of Christ. Truth without love is brutality. Love without truth is enabling. The mature leader holds both — and that maturity is the engine of team growth.',q:[
{t:'s',q:'How do you currently communicate difficult truths to people on your team? Walk through your actual process.'},
{t:'m',q:'Ephesians 4:15 says speaking the truth in love we will grow to become the mature body of whom?',o:['The apostles','The church','Christ who is the head','God the Father']},
{t:'s',q:'Where does your communication currently lean too far toward truth without love?'},
{t:'s',q:'Where does your communication currently lean too far toward love without truth?'},
{t:'s',q:'Write a communication commitment for your team — what you commit to in terms of honesty, timeliness and tone in every difficult conversation.'}
]},
{day:50,stage:3,title:'Halfway — the long middle',ref:'Isaiah 40:31',dev:'Those who hope in the Lord will renew their strength. They will soar on wings like eagles; they will run and not grow weary, they will walk and not be faint. Day 50. Past the halfway point. These middle days require something different — sustained hope.',q:[
{t:'s',q:'You are 50 days into this 90-day journey. What has surprised you most about yourself so far?'},
{t:'m',q:'Isaiah 40:31 says those who hope in the Lord will soar on wings like eagles and also do two other things. What are they?',o:['Pray and fast','Worship and serve','Run and not grow weary, walk and not be faint','Fight and overcome']},
{t:'s',q:'Where do you feel the most weary right now — in your study, in your ministry, in your personal life?'},
{t:'s',q:'What has God revealed about your team dynamics in the first 4 days of Stage 3 that you were not expecting?'},
{t:'s',q:'Write a midpoint prayer for the second half — what you are releasing from the first 50 days and what you are asking God to build in the next 40.'}
]},
{day:51,stage:3,title:'Managing conflict on a team',ref:'Matthew 5:23-24',dev:'If you are offering your gift at the altar and remember that your brother has something against you — leave your gift. Go and be reconciled. Jesus put reconciliation above worship. Unresolved team conflict is not just a relational problem — it is a spiritual one.',q:[
{t:'s',q:'What unresolved conflict exists on your team right now that you have been managing around rather than addressing directly?'},
{t:'m',q:'Matthew 5:24 says to leave your gift at the altar and first go be reconciled to your brother then come back and do what?',o:['Pray','Offer your gift','Confess','Worship']},
{t:'s',q:'What is your typical role in team conflict — peacemaker, avoider, escalator or direct confronter? What does that role produce?'},
{t:'s',q:'What is the cost to ministry effectiveness when team conflict is managed rather than resolved?'},
{t:'s',q:'Name one specific conflict on your team you will address this week. Write exactly what you will say and when.'}
]},
{day:52,stage:3,title:'Developing emerging leaders',ref:'2 Timothy 2:2',dev:'The things you have heard me say — entrust to reliable people who will also be qualified to teach others. Four generations in one verse. If you are not building toward four generations of leadership you are thinking one generation too small.',q:[
{t:'s',q:'Who are the emerging leaders in your sphere that you are currently investing in? Name them and describe your investment in each.'},
{t:'m',q:'2 Timothy 2:2 describes a chain of entrusting. Paul entrusts to Timothy, Timothy to reliable people, and reliable people to whom?',o:['The church','Others','Future generations','The apostles']},
{t:'s',q:'What is the difference between mentoring someone and just including them in what you are already doing?'},
{t:'s',q:'What would it take for you to be more intentional about developing the next generation of leaders in SIM?'},
{t:'s',q:'Write a 2 Timothy 2:2 multiplication plan — name the person you are investing in, name who you are asking them to invest in.'}
]},
{day:53,stage:3,title:'Team culture and values',ref:'Acts 2:44-45',dev:'All the believers were together and had everything in common. The early church had not been given a policy manual — they had been transformed. Their culture was the overflow of their transformation. Culture is what a team does when no one is telling them what to do.',q:[
{t:'s',q:'What is the current culture of your team — not what you say it is but what it actually is when you observe behavior?'},
{t:'m',q:'Acts 2:44 says all the believers were together and had what in common?',o:['One leader','One doctrine','Everything','One meeting place']},
{t:'s',q:'What values does your team currently embody in practice — not on a wall but in actual daily behavior?'},
{t:'s',q:'What values should your team embody that are currently aspirational rather than actual? What is the gap?'},
{t:'s',q:'Write three core cultural values for your team — each stated as a behavior with one specific action that demonstrates each value.'}
]},
{day:54,stage:3,title:'Releasing people well',ref:'Acts 13:2-3',dev:'The Holy Spirit said, "Set apart for me Barnabas and Saul." So they placed their hands on them and sent them off. The church at Antioch sent away two of their best people. That is a test of a leader\'s security.',q:[
{t:'s',q:'How do you respond when a gifted person on your team senses a call to a different assignment? Is your default to hold or to release?'},
{t:'m',q:'Acts 13:3 says after fasting and praying, the church did what to Barnabas and Saul?',o:['Anointed them with oil','Placed their hands on them','Commissioned them publicly','Prayed for their families']},
{t:'s',q:'Have you ever held someone back from their assignment — consciously or unconsciously — because losing them would cost you?'},
{t:'s',q:'What does releasing someone well look like — what does a healthy sending look like in your ministry?'},
{t:'s',q:'Is there someone currently in your team who may be ready to be sent? What is holding you back from initiating that conversation?'}
]},
{day:55,stage:3,title:'When teams fail',ref:'Mark 14:50',dev:'Then everyone deserted him and fled. Jesus was abandoned by His entire team in the most critical moment. All twelve. A leader must be able to absorb team failure without collapsing, becoming bitter or losing sight of the mission.',q:[
{t:'s',q:'Describe the most significant team failure you have experienced in ministry. What happened?'},
{t:'m',q:'Mark 14:50 says that when Jesus was arrested, everyone did what?',o:['Stayed nearby','Wept openly','Deserted him and fled','Tried to defend him']},
{t:'s',q:'What did that team failure reveal in you — about your resilience, your dependence on people, your trust in God?'},
{t:'s',q:'How do you lead through team failure without becoming either a people-pleaser or a lone ranger?'},
{t:'s',q:'What have you learned from team failure that you have built into how you now lead and develop people?'}
]},
{day:56,stage:3,title:'Honoring different generations',ref:'Leviticus 19:32',dev:'Stand up in the presence of the aged and revere your God. Honoring different generations is not a cultural sensitivity issue — God connected it directly to fearing Him.',q:[
{t:'s',q:'What are the different generational groups represented in your ministry team? What tensions exist between them?'},
{t:'m',q:'Leviticus 19:32 says to stand up in the presence of the aged and show respect for the elderly and also to do what?',o:['Give them positions','Revere your God','Listen to their wisdom','Seek their counsel']},
{t:'s',q:'How do you honor the wisdom of older leaders without dismissing the energy and fresh perspective of younger ones?'},
{t:'s',q:'What specifically do you do to bridge generational gaps on your team?'},
{t:'s',q:'Write a generational honor commitment — what you commit to in how you treat and develop leaders both older and younger than yourself.'}
]},
{day:57,stage:3,title:'Correcting team members',ref:'Proverbs 27:5-6',dev:'Better is open rebuke than hidden love. Wounds from a friend can be trusted. The leader who cannot correct their team is not protecting them — they are abandoning them. Correction from genuine love is one of the most powerful tools in a leader\'s hands.',q:[
{t:'s',q:'How comfortable are you with correcting the people you lead? What makes it easy or difficult?'},
{t:'m',q:'Proverbs 27:6 says wounds from a friend can be trusted but an enemy multiplies what?',o:['Lies','Wounds','Kisses','Flattery']},
{t:'s',q:'What is the difference between correcting someone to fix a behavior and correcting someone to develop a person?'},
{t:'s',q:'Is there a correction you have been avoiding giving to someone on your team? What is the cost of your silence?'},
{t:'s',q:'Write a framework for how you give correction — what you say, what tone you use and how you ensure the relationship is strengthened.'}
]},
{day:58,stage:3,title:'Celebrating your team',ref:'Romans 12:15',dev:'Rejoice with those who rejoice; mourn with those who mourn. The first half is actually harder for most leaders. When someone on your team wins — your genuine, unhurried celebration of them is a profound act of leadership.',q:[
{t:'s',q:'How intentional are you about celebrating the wins of the people on your team — publicly and privately?'},
{t:'m',q:'Romans 12:15 calls us to rejoice with those who rejoice and to do what with those who mourn?',o:['Comfort them','Mourn with them','Pray for them','Give them space']},
{t:'s',q:'When someone on your team receives recognition, what is your honest internal response? Pride in them, or something more complicated?'},
{t:'s',q:'What would it look like to build a culture of celebration in your team where victories are honored?'},
{t:'s',q:'Name one person on your team right now who deserves to be specifically celebrated. Write what you will say to them and when — then do it.'}
]},
{day:59,stage:3,title:'Team prayer and devotion',ref:'Colossians 3:16',dev:'Let the message of Christ dwell among you richly as you teach and admonish one another with all wisdom. Teams can be spiritually dry together even when each person has a personal devotional life.',q:[
{t:'s',q:'What does the corporate spiritual life of your team currently look like — prayer together, Word together, worship together?'},
{t:'m',q:'Colossians 3:16 says let the message of Christ dwell among you richly and teach and admonish one another with all what?',o:['Love','Sincerity','Wisdom','Patience']},
{t:'s',q:'What is the difference between having a prayer at the start of a team meeting and genuinely seeking God together?'},
{t:'s',q:'What changes would you need to make to your team gatherings to prioritize genuine spiritual life together?'},
{t:'s',q:'Design a team devotional rhythm for your ministry — what it would include, how often it would happen and what transformation you believe it would produce.'}
]},
{day:60,stage:3,title:'Succession within the team',ref:'Numbers 27:18-20',dev:'So the Lord said to Moses, "Take Joshua — a man in whom is the spirit of leadership — and lay your hand on him. Give him some of your authority." Moses did not choose his successor from outside — he developed him from within.',q:[
{t:'s',q:'If you were unable to lead your current role for six months, who on your team could step into it? How prepared would they be?'},
{t:'m',q:'Numbers 27:20 says Moses was to give Joshua some of his what so that the whole community would obey him?',o:['Title','Wisdom','Authority','Anointing']},
{t:'s',q:'What are you currently doing to develop your own succession within your team?'},
{t:'s',q:'What is the danger of a team where the leader is so central that nothing can function without them?'},
{t:'s',q:'Write a succession development plan — name the person you believe could succeed you, what they still need and how you will accelerate that development.'}
]},
{day:61,stage:3,title:'Teams under pressure',ref:'Nehemiah 4:6',dev:'The people worked with all their heart. They were building with enemies mocking them, threatening them, plotting against them. And the wall went up. A team under pressure is revealed. What you see is the true team.',q:[
{t:'s',q:'What is your team currently under pressure about? How is the team responding to that pressure?'},
{t:'m',q:'Nehemiah 4:6 says the people rebuilt the wall because they did what?',o:['Followed instructions','Trusted Nehemiah','Worked with all their heart','Had no distractions']},
{t:'s',q:'What does your team reveal about itself under pressure — what strengths emerge, what fractures appear?'},
{t:'s',q:'How do you as a leader set the tone for how your team responds to pressure?'},
{t:'s',q:'Design a pressure response protocol for your team — what you will do together when opposition or crisis hits.'}
]},
{day:62,stage:3,title:'The gift of diversity on a team',ref:'Acts 6:1-4',dev:"The early church's first recorded internal conflict was cultural. They resolved it by appointing leaders from the underrepresented community. Diversity handled well produces strength. Diversity ignored produces fracture.",q:[
{t:'s',q:'How diverse is your current ministry team — in background, in gifting, in personality, in life experience?'},
{t:'m',q:'Acts 6:3 says to choose seven men who are known to be full of the Spirit and what else?',o:['Faith and love','Wisdom','Prayer and fasting','Obedience']},
{t:'s',q:'Where has diversity on your team created tension? Where has it created strength that a homogeneous team could not produce?'},
{t:'s',q:'What voices or perspectives are missing from your team right now that would make your ministry more effective?'},
{t:'s',q:'Write a diversity commitment for your team — not as a program but as a theological conviction about why difference makes the body stronger.'}
]},
{day:63,stage:3,title:'When to let someone go',ref:'Acts 15:36-39',dev:'Paul and Barnabas had such a sharp disagreement over Mark that they parted company. Ministry giants could not agree on a personnel decision. These things are hard. They are also necessary.',q:[
{t:'s',q:'What are the indicators that tell you someone is no longer a fit for their current role on your team?'},
{t:'m',q:'The sharp disagreement between Paul and Barnabas over Mark ultimately resulted in what?',o:["Mark being disciplined","The mission being cancelled","Two ministry teams instead of one","A church split"]},
{t:'s',q:'Have you ever had to remove someone from a ministry role? What happened and how did you handle it?'},
{t:'s',q:'What is the cost to the team of keeping someone in a role that is not right for them?'},
{t:'s',q:'Write a framework for how you make and communicate personnel transitions in your ministry.'}
]},
{day:64,stage:3,title:'Rest and team health',ref:'Mark 6:31',dev:'Come with me by yourselves to a quiet place and get some rest. Jesus said that right after one of the most productive ministry seasons the disciples had experienced. Even the disciples needed someone to pull them back from the ministry to preserve their capacity for it.',q:[
{t:'s',q:'What is the rest culture of your ministry team? Do you model and protect rest or do you model unsustainable pace?'},
{t:'m',q:'Mark 6:31 says Jesus told the disciples to come away because so many people were coming and going that they did not even have a chance to do what?',o:['Pray','Sleep','Eat','Study']},
{t:'s',q:'What signals tell you that a team member is running on empty? How early do you catch those signals?'},
{t:'s',q:'Is there a member of your team right now who needs to be pulled back to rest but will not do it without your encouragement?'},
{t:'s',q:'Write a team health policy — what you commit to protecting for your team in terms of rest, pace, margin and sustainability.'}
]},
{day:65,stage:3,title:'Stewarding team wins',ref:'Deuteronomy 8:17-18',dev:'"My power and the strength of my hands have produced this wealth." But remember the Lord your God, for it is He who gives you the ability. Team wins create a specific spiritual danger — the subtle drift toward believing the win was because of your strategy.',q:[
{t:'s',q:'How do you currently handle team wins spiritually — do you give God genuine credit or has success created a subtle distance from dependence on Him?'},
{t:'m',q:'Deuteronomy 8:18 says to remember the Lord your God for it is He who gives you the ability to produce wealth and so confirms what?',o:['Your faithfulness','His blessing','His covenant which he swore to your ancestors','Your obedience']},
{t:'s',q:'Describe your most significant team win in recent years. How did you handle it spiritually?'},
{t:'s',q:'What is the danger of a team that wins often without consistently returning to God in gratitude and dependence?'},
{t:'s',q:'Write a team gratitude declaration — giving God specific credit for recent wins and declaring your continued dependence on Him.'}
]},
{day:66,stage:3,title:'Equipping versus doing',ref:'Ephesians 4:12',dev:'The five-fold ministry gifts were not given so leaders could do all the ministry. They were given so leaders could equip others to do it. The most productive version of your leadership is the version that multiplies rather than performs.',q:[
{t:'s',q:'What percentage of your ministry time is currently spent doing versus equipping others to do? What would the ideal ratio be?'},
{t:'m',q:"Ephesians 4:12 says the ministry gifts were given to equip God's people so that the body of Christ may be what?",o:['Organized','Built up','Inspired','Grown numerically']},
{t:'s',q:'What are you currently doing in ministry that should be in the hands of someone you are developing?'},
{t:'s',q:'What is the internal resistance you feel when you think about releasing ministry functions to others?'},
{t:'s',q:'Write an equipping plan for the next 90 days — three specific ministry functions you will transfer to someone else.'}
]},
{day:67,stage:3,title:'Stage 3 reflection — Team Dynamics',ref:'Psalm 133:1',dev:'How good and pleasant it is when God\'s people live together in unity! David did not say it is theologically correct. He said it is good. And pleasant. Both. Stage 3 ends here. How good and pleasant is your team right now?',q:[
{t:'s',q:'What is the most significant shift in how you think about and lead your team after these 22 days of Stage 3?'},
{t:'m',q:'Psalm 133:1 describes unity as being both good and what else?',o:['Holy','Powerful','Pleasant','Required']},
{t:'s',q:'Which day in Stage 3 was the most challenging or convicting for you personally? What made it hit home?'},
{t:'s',q:'Name one specific change you have made or committed to make in how you lead your team as a result of Stage 3.'},
